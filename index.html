/**
 * useDailyDigestScheduler – React hook.
 * Checks every minute if the configured digest time has arrived and fires.
 * Must be called with live requirements/plants/users from App state.
 */
function useDailyDigestScheduler(requirements, plants, users) {
  // Store latest data in refs so the interval closure always sees fresh values
  // without needing to be recreated on every state change (which would reset
  // the 60-second clock and risk missing the send window entirely).
  const reqRef   = useRef(requirements);
  const plantRef = useRef(plants);
  const userRef  = useRef(users);
  useEffect(() => { reqRef.current   = requirements; }, [requirements]);
  useEffect(() => { plantRef.current = plants;       }, [plants]);
  useEffect(() => { userRef.current  = users;        }, [users]);

  useEffect(() => {
    const tick = async () => {
      try {
        const raw = localStorage.getItem('adminSettings');
        if (!raw) return;
        const cfg = JSON.parse(raw);
        if (!cfg.dailyDigestEnabled) return;

        const digestTime = cfg.dailyDigestTime || '08:00'; // HH:mm
        const [hh, mm]   = digestTime.split(':').map(Number);
        const now        = new Date();
        const todayKey   = now.toISOString().slice(0,10); // YYYY-MM-DD
        const lastSent   = localStorage.getItem('lastDailyDigestSent') || '';
        const lastSentDay= lastSent.slice(0,10);

        // Fire if current time is at or past the configured time and we haven't sent today yet.
        // >= catches the case where the app is opened/refreshed after the configured time
        // (e.g. page load at 08:05 with digest set for 08:00 — it still fires on mount).
        const nowMins = now.getHours() * 60 + now.getMinutes();
        const cfgMins = hh * 60 + mm;
        if (nowMins >= cfgMins && lastSentDay !== todayKey) {
          await sendDailyDigestMail(reqRef.current, plantRef.current, userRef.current);
        }
      } catch(e) {
        console.warn('⚠️ Digest scheduler tick error:', e?.message||e);
      }
    };

    tick(); // run once on mount — catches up if configured time already passed today
    const id = setInterval(tick, 60000); // check every minute
    return () => clearInterval(id);
  }, []); // stable: interval created once, refs keep data current without resetting it
}

/* ═══════════════════════════════════════════
   ESCALATION LEVEL PANEL (reusable)
   – one panel per level; own draft-email state
═══════════════════════════════════════════ */
const ESC_LEVEL_COLORS = { 1:'#22c55e', 2:'#f59e0b', 3:'#ef4444' };
const ESC_LEVEL_LABELS = { 1:'Level 1 – Plant Head', 2:'Level 2 – Regional Manager', 3:'Level 3 – Top Management' };

function EscalationLevelPanel({ level, allEmails, onUpdate, dk }) {
  const [draft, setDraft] = useState('');
  const [err, setErr]     = useState('');
  const emails  = (allEmails && allEmails[level]) ? allEmails[level] : [];
  const color   = ESC_LEVEL_COLORS[level];
  const label   = ESC_LEVEL_LABELS[level];
  const roleLabel = label.split('–')[1]?.trim() || 'escalation';

  const addEmail = () => {
    const trimmed = draft.trim().toLowerCase();
    if (!trimmed) return;
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmed)) { setErr('Invalid email address'); return; }
    if (emails.includes(trimmed)) { setErr('Email already added'); return; }
    onUpdate({ ...allEmails, [level]: [...emails, trimmed] });
    setDraft(''); setErr('');
  };

  const removeEmail = (email) => {
    onUpdate({ ...allEmails, [level]: emails.filter(e => e !== email) });
  };

  return (
    <div className="sm:col-span-2">
      <div className={`rounded-xl border p-3 transition-all ${dk ? 'bg-gray-800 border-gray-600' : 'bg-gray-50 border-gray-200'}`}
        style={{ borderLeftWidth: '3px', borderLeftColor: color }}>
        {/* Header */}
        <div className="flex items-center gap-2 mb-2">
          <span className="w-5 h-5 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
            style={{ background: color }}>{level}</span>
          <span className="text-xs font-semibold" style={{ color }}>{label}</span>
          {emails.length > 0 && (
            <span className="ml-auto text-xs px-1.5 py-0.5 rounded-full font-medium"
              style={{ background: color + '22', color }}>
              {emails.length} recipient{emails.length > 1 ? 's' : ''}
            </span>
          )}
        </div>
        {/* Email tags */}
        {emails.length > 0 && (
          <div className="flex flex-wrap gap-1.5 mb-2">
            {emails.map(email => (
              <span key={email}
                className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium border ${dk ? 'bg-gray-700 border-gray-500 text-gray-200' : 'bg-white border-gray-300 text-gray-700'}`}>
                ✉️ {email}
                <button type="button" onClick={() => removeEmail(email)}
                  className="ml-0.5 text-gray-400 hover:text-red-500 transition-colors font-bold leading-none text-sm">×</button>
              </span>
            ))}
          </div>
        )}
        {/* Add row */}
        <div className="flex gap-2">
          <input
            type="email"
            value={draft}
            onChange={e => { setDraft(e.target.value); setErr(''); }}
            onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addEmail(); } }}
            placeholder={`Add ${roleLabel} email…`}
            className={`flex-1 px-3 py-1.5 rounded-lg border text-xs focus:outline-none focus:ring-2 transition
              ${err ? 'border-red-400 focus:ring-red-300' : 'border-gray-200 focus:ring-purple-400 dark:border-gray-600'}
              ${dk ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-400' : 'bg-white text-gray-900 placeholder-gray-400'}`}
          />
          <button type="button" onClick={addEmail}
            className="px-3 py-1.5 rounded-lg text-xs font-semibold text-white transition-colors flex-shrink-0 hover:opacity-90"
            style={{ background: color }}>
            + Add
          </button>
        </div>
        {err && <p className="text-xs text-red-500 mt-1">{err}</p>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   REQUIREMENT MODAL (Add / Edit)
═══════════════════════════════════════════ */
function RequirementModal({ open, onClose, onSave, initial, plants, users, dk, categories: catsProp }) {
  const cats = catsProp || CATEGORIES;
  const blank = { title:'', description:'', category: (catsProp||CATEGORIES)[0]||'', priority:'High', plantId:'', plantIds:[], assignedTo:[], status:'Pending', dueDate:'', completionDate:'', reminderFrequency:'Weekly', escalationLevel:1, escalationEmail:'', escalationEmails:{ 1:[], 2:[], 3:[] }, applicableRule:'', legalClause:'' };
  const [form, setForm] = useState(blank);
  const [saving, setSaving] = useState(false);
  useEffect(()=>{
    const init = initial ? {
      ...initial,
      assignedTo: Array.isArray(initial.assignedTo) ? initial.assignedTo : (initial.assignedTo ? [initial.assignedTo] : []),
      // Normalise legacy single escalationEmail → escalationEmails map
      escalationEmails: initial.escalationEmails && typeof initial.escalationEmails === 'object'
        ? { 1: initial.escalationEmails[1]||[], 2: initial.escalationEmails[2]||[], 3: initial.escalationEmails[3]||[] }
        : (initial.escalationEmail
            ? { 1:[initial.escalationEmail], 2:[], 3:[] }
            : { 1:[], 2:[], 3:[] })
    } : blank;
    setForm(init);
  }, [open]);

  const plantUsers = users.filter(u=>u.plantId===form.plantId && ['user','plant_head'].includes(u.role));
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const toggleUserAssign = (uid) => {
    const arr = Array.isArray(form.assignedTo) ? form.assignedTo : (form.assignedTo ? [form.assignedTo] : []);
    const idx = arr.indexOf(uid);
    set('assignedTo', idx >= 0 ? arr.filter(x=>x!==uid) : [...arr, uid]);
  };

  const save = async () => {
    // Determine plants: use plantIds if set, fall back to single plantId
    const selectedPlantIds = (form.plantIds && form.plantIds.length > 0) ? form.plantIds : (form.plantId ? [form.plantId] : []);
    if (!form.title || selectedPlantIds.length === 0 || !form.dueDate) return;
    setSaving(true);
    await new Promise(r=>setTimeout(r,400));
    onSave({ ...form, plantIds: selectedPlantIds, plantId: selectedPlantIds[0] || form.plantId });
    setSaving(false);
    onClose();
  };

  return (
    <Modal open={open} onClose={onClose} title={initial?'Edit Requirement':'Add New Requirement'} wide>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div className="sm:col-span-2">
          <FormField label="Title" required>
            <input value={form.title} onChange={e=>set('title',e.target.value)} placeholder="e.g. Factory License Renewal" className={inputCls} />
          </FormField>
        </div>
        <div className="sm:col-span-2">
          <FormField label="Description">
            <textarea value={form.description} onChange={e=>set('description',e.target.value)} rows={2} placeholder="Detailed description..." className={inputCls + ' resize-none'} />
          </FormField>
        </div>
        <FormField label="Plant(s)" required>
          <div className="space-y-1.5">
            <div className={`flex flex-wrap gap-1.5 min-h-[40px] p-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 cursor-pointer`}>
              {plants.map(p => {
                const selected = (form.plantIds||[]).includes(p.id) || (form.plantId===p.id && !(form.plantIds||[]).length);
                return (
                  <button key={p.id} type="button"
                    onClick={() => {
                      const ids = form.plantIds && form.plantIds.length > 0 ? [...form.plantIds] : (form.plantId ? [form.plantId] : []);
                      const idx = ids.indexOf(p.id);
                      if (idx >= 0) { ids.splice(idx,1); } else { ids.push(p.id); }
                      set('plantIds', ids);
                      set('plantId', ids[0]||'');
                      set('assignedTo',[]);
                    }}
                    className={`px-2.5 py-1 rounded-lg text-xs font-medium transition-all border ${selected ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-gray-50 dark:bg-gray-600 text-gray-600 dark:text-gray-300 border-gray-200 dark:border-gray-500 hover:border-indigo-400'}`}>
                    {p.name}
                  </button>
                );
              })}
            </div>
            {(form.plantIds||[]).length > 1 && (
              <p className="text-xs text-indigo-500 font-medium">📢 This requirement will be created for {(form.plantIds||[]).length} plants</p>
            )}
          </div>
        </FormField>
        <FormField label="Assign To (User/s)">
          {!form.plantId ? (
            <p className="text-xs text-gray-400 italic px-3 py-2.5">Select a plant first</p>
          ) : plantUsers.length === 0 ? (
            <p className="text-xs text-gray-400 italic px-3 py-2.5">No users in this plant</p>
          ) : (
            <div className={`flex flex-wrap gap-1.5 p-2 rounded-xl border ${dk?'border-gray-600 bg-gray-700':'border-gray-200 bg-white'}`}>
              {plantUsers.map(u => {
                const assigned = Array.isArray(form.assignedTo) ? form.assignedTo : (form.assignedTo ? [form.assignedTo] : []);
                const sel = assigned.includes(u.id);
                return (
                  <button key={u.id} type="button"
                    onClick={() => toggleUserAssign(u.id)}
                    className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium border transition-all ${sel ? 'bg-indigo-600 text-white border-indigo-600 shadow-sm' : dk?'bg-gray-600 text-gray-200 border-gray-500 hover:border-indigo-400':'bg-gray-50 text-gray-600 border-gray-200 hover:border-indigo-400'}`}>
                    <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold ${sel?'bg-indigo-400 text-white':'bg-gray-300 text-gray-600'}`}>{initials(u.name)}</span>
                    {u.name}
                    {sel && <span className="ml-0.5 text-indigo-200">✓</span>}
                  </button>
                );
              })}
            </div>
          )}
          {Array.isArray(form.assignedTo) && form.assignedTo.length > 0 && (
            <p className="text-xs text-indigo-500 font-medium mt-1">👥 {form.assignedTo.length} user{form.assignedTo.length>1?'s':''} assigned</p>
          )}
        </FormField>
        <FormField label="Category" required>
          <select value={form.category} onChange={e=>set('category',e.target.value)} className={selectCls}>
            {cats.map(c=><option key={c}>{c}</option>)}
          </select>
        </FormField>
        <FormField label="Priority" required>
          <select value={form.priority} onChange={e=>set('priority',e.target.value)} className={selectCls}>
            {PRIORITIES.map(p=><option key={p}>{p}</option>)}
          </select>
        </FormField>
        <FormField label="Status">
          <select value={form.status} onChange={e=>set('status',e.target.value)} className={selectCls}>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </FormField>
        <FormField label="Due Date" required>
          <input type="date" value={form.dueDate} onChange={e=>set('dueDate',e.target.value)} className={inputCls} />
        </FormField>
        <FormField label="Completion Date">
          <input type="date" value={form.completionDate||''} onChange={e=>set('completionDate',e.target.value)} className={inputCls} title="Actual or target completion date" />
        </FormField>
        <FormField label="Reminder Frequency">
          <select value={form.reminderFrequency} onChange={e=>set('reminderFrequency',e.target.value)} className={selectCls}>
            {REM_FREQS.map(r=><option key={r}>{r}</option>)}
          </select>
        </FormField>
        <FormField label="Escalation Level">
          <select value={form.escalationLevel} onChange={e=>set('escalationLevel',+e.target.value)} className={selectCls}>
            {ESC_LABELS.map((l,i)=><option key={i} value={i+1}>{l}</option>)}
          </select>
        </FormField>
        {/* ── Escalation Email Notifications (per level) ── */}
        <div className="sm:col-span-2">
          <div className="flex items-center gap-2 my-1">
            <div className="flex-1 h-px bg-gray-200 dark:bg-gray-600" />
            <span className="text-xs font-bold uppercase tracking-widest text-purple-500 px-2">📧 Escalation Email Notifications</span>
            <div className="flex-1 h-px bg-gray-200 dark:bg-gray-600" />
          </div>
        </div>
        {[1,2,3].map(level => (
          <EscalationLevelPanel
            key={level}
            level={level}
            allEmails={form.escalationEmails || {1:[],2:[],3:[]}}
            onUpdate={updated => set('escalationEmails', updated)}
            dk={dk}
          />
        ))}

        {/* ── Legal & Regulatory Section ── */}
        <div className="sm:col-span-2">
          <div className="flex items-center gap-2 my-1">
            <div className="flex-1 h-px bg-gray-200 dark:bg-gray-600" />
            <span className="text-xs font-bold uppercase tracking-widest text-indigo-500 px-2">⚖️ Legal &amp; Regulatory</span>
            <div className="flex-1 h-px bg-gray-200 dark:bg-gray-600" />
          </div>
        </div>

        <div className="sm:col-span-2">
          <FormField label="Applicable Rule / Regulation">
            <input
              value={form.applicableRule}
              onChange={e=>set('applicableRule',e.target.value)}
              placeholder="e.g. Factories Act, 1948 – Section 6 & 7"
              className={inputCls}
            />
          </FormField>
        </div>
        <div className="sm:col-span-2">
          <FormField label="Legal Clause / Provision">
            <textarea
              value={form.legalClause}
              onChange={e=>set('legalClause',e.target.value)}
              rows={3}
              placeholder="Describe the specific legal clause, section, or provision that mandates this compliance requirement…"
              className={inputCls + ' resize-none'}
            />
          </FormField>
        </div>
      </div>
      <div className="flex gap-3 mt-6 pt-4 border-t border-gray-100 dark:border-gray-700">
        <button onClick={onClose} className={`flex-1 py-2.5 rounded-xl border text-sm font-medium transition-colors ${dk?'border-gray-600 text-gray-300 hover:bg-gray-700':'border-gray-200 text-gray-700 hover:bg-gray-50'}`}>Cancel</button>
        <button onClick={save} disabled={saving||!form.title||!form.plantId||!form.dueDate}
          className="flex-1 py-2.5 rounded-xl bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 disabled:opacity-50 transition-colors">
          {saving?'Saving…':initial?'Update':'Add Requirement'}
        </button>
      </div>
    </Modal>
  );
}

/* ═══════════════════════════════════════════
   ADMIN – REQUIREMENTS
═══════════════════════════════════════════ */
function AdminRequirements({ dk, plants, users, requirements, updateRequirements, categories: catsProp, openReqId, onNotifReqOpened }) {
  const cats = catsProp || CATEGORIES;
  const [filters,      setFilters]      = useState({ plant:'', status:'', priority:'', search:'' });
  const [showAdd,      setShowAdd]      = useState(false);
  const [editReq,      setEditReq]      = useState(null);
  const [viewReq,      setViewReq]      = useState(null);
  const [delId,        setDelId]        = useState(null);
  /* ── Bulk selection state ── */
  const [selected,     setSelected]     = useState(new Set()); // Set of req IDs
  const [bulkConfirm,  setBulkConfirm]  = useState(false);

  const set = (k,v) => { setFilters(f=>({...f,[k]:v})); setSelected(new Set()); };

  const downloadEvidence = (ev) => {
    const url = ev.storageUrl || ev.dataUrl;
    if (!url) {
      alert('File not available. Please ask the user to re-upload.');
      return;
    }
    if (ev.storageUrl) {
      window.open(ev.storageUrl, '_blank');
      return;
    }
    const a = document.createElement('a');
    a.href = ev.dataUrl;
    a.download = ev.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  // Auto-open requirement when triggered from notification bell
  React.useEffect(() => {
    if (openReqId) {
      const req = requirements.find(r => r.id === openReqId);
      if (req) { setViewReq(req); if (onNotifReqOpened) onNotifReqOpened(); }
    }
  }, [openReqId]);

  const filtered = requirements.filter(r => {
    if (filters.plant    && r.plantId  !== filters.plant)    return false;
    if (filters.status   && r.status   !== filters.status)   return false;
    if (filters.priority && r.priority !== filters.priority) return false;
    if (filters.search   && !r.title.toLowerCase().includes(filters.search.toLowerCase())) return false;
    return true;
  });

  /* ── Checkbox helpers ── */
  const filteredIds   = filtered.map(r => r.id);
  const allChecked    = filteredIds.length > 0 && filteredIds.every(id => selected.has(id));
  const someChecked   = filteredIds.some(id => selected.has(id)) && !allChecked;

  const toggleAll = () => {
    if (allChecked) {
      // Deselect all visible
      setSelected(prev => { const s = new Set(prev); filteredIds.forEach(id => s.delete(id)); return s; });
    } else {
      // Select all visible
      setSelected(prev => { const s = new Set(prev); filteredIds.forEach(id => s.add(id)); return s; });
    }
  };

  const toggleOne = (id) => {
    setSelected(prev => {
      const s = new Set(prev);
      s.has(id) ? s.delete(id) : s.add(id);
      return s;
    });
  };

  /* ── CRUD ── */
  const addReq = form => {
    const plantIdsList = (form.plantIds && form.plantIds.length > 0) ? form.plantIds : (form.plantId ? [form.plantId] : []);
    const now = new Date().toISOString();
    const newReqs = plantIdsList.map((pid, idx) => ({
      ...form,
      id: `r${Date.now()}${idx}`,
      plantId: pid,
      plantIds: plantIdsList,
      createdAt: now,
      evidence: [],
      comments: []
    }));
    updateRequirements([...newReqs, ...requirements]);
    // ── Email per plant ──
    newReqs.forEach(newR => {
      const plant    = plants.find(p => p.id === newR.plantId);
      const assignedIds = Array.isArray(newR.assignedTo) ? newR.assignedTo : (newR.assignedTo ? [newR.assignedTo] : []);
      const assignees = assignedIds.map(id=>users.find(u=>u.id===id)).filter(Boolean);
      sendComplianceMail({ trigger:'new_requirement', req:newR, plant, assignee:assignees[0]||null, changedBy:null });
      assignees.forEach(assignee => {
        sendComplianceMail({ trigger:'new_assignment', req:newR, plant, assignee, changedBy:null });
      });
    });
  };

  const saveEdit = form => {
    const old = requirements.find(r => r.id === editReq.id);
    const updated = { ...old, ...form };
    updateRequirements(requirements.map(r => r.id === editReq.id ? updated : r));
    if (!old) return;
    const plant = plants.find(p => p.id === updated.plantId);
    const newIds = Array.isArray(updated.assignedTo) ? updated.assignedTo : (updated.assignedTo ? [updated.assignedTo] : []);
    const oldIds = Array.isArray(old.assignedTo) ? old.assignedTo : (old.assignedTo ? [old.assignedTo] : []);
    // ── Status changed ──
    if (old.status !== updated.status) {
      const primaryAssignee = users.find(u=>u.id===newIds[0]);
      sendComplianceMail({ trigger:'status_change', req:updated, plant, assignee:primaryAssignee||null, oldStatus:old.status, changedBy:null });
    }
    // ── Assignment changed ──
    const added   = newIds.filter(id=>!oldIds.includes(id));
    const removed = oldIds.filter(id=>!newIds.includes(id));
    added.forEach(id => {
      const assignee = users.find(u=>u.id===id);
      if (assignee) sendComplianceMail({ trigger:'new_assignment', req:updated, plant, assignee, changedBy:null });
    });
    removed.forEach(id => {
      const oldAssignee = users.find(u=>u.id===id);
      const primaryAssignee = users.find(u=>u.id===newIds[0]);
      if (oldAssignee) sendComplianceMail({ trigger:'reassignment', req:updated, plant, assignee:primaryAssignee||null, oldAssignee, changedBy:null });
    });
  };

  /* ── Delete evidence files from Firebase Storage for a requirement ── */
  /* ── Delete all Storage files for a requirement (called on req deletion) ── */
  const deleteReqStorageFiles = async (req) => {
    if (!window.fbStorage || !req) return;
    await fbEnsureAuth();
    const evidenceList = req.evidence || [];
    for (const ev of evidenceList) {
      if (!ev.storageUrl) continue; // base64-only, nothing in Storage
      try {
        const path = `evidence/${req.id}/${ev.id}_${ev.name}`;
        await window.fbStorage.ref(path).delete();
        console.log('🗑️ Deleted from Firebase Storage:', path);
      } catch(e) {
        console.warn('Storage delete failed (may already be gone):', e.message);
        // Try alternate path
        try { await window.fbStorage.ref(`evidence/${req.id}/${ev.id}`).delete(); } catch(_) {}
      }
    }
    // Note: Firestore document entry is removed by updateRequirements() caller
  };

  const confirmDel = () => {
    const req = requirements.find(r => r.id === delId);
    updateRequirements(requirements.filter(r => r.id !== delId));
    setDelId(null);
    // Delete associated Firebase Storage files asynchronously
    if (req) deleteReqStorageFiles(req);
  };

  /* ── Bulk delete ── */
  const confirmBulkDelete = () => {
    const toDelete = requirements.filter(r => selected.has(r.id));
    updateRequirements(requirements.filter(r => !selected.has(r.id)));
    setSelected(new Set());
    setBulkConfirm(false);
    // Delete associated Firebase Storage files for each deleted requirement
    toDelete.forEach(req => deleteReqStorageFiles(req));
  };

  const card = `rounded-2xl border shadow-sm ${dk?'bg-gray-800 border-gray-700':'bg-white border-gray-200'}`;
  const sub  = dk?'text-gray-400':'text-gray-500';

  return (
    <div className="space-y-5">

      {/* Single delete confirm */}
      <ConfirmModal open={!!delId} message="Delete this requirement permanently?" onConfirm={confirmDel} onCancel={()=>setDelId(null)} />

      {/* Bulk delete confirm */}
      {bulkConfirm && (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4"
          style={{backdropFilter:'blur(4px)',background:'rgba(0,0,0,0.6)'}}>
          <div className={`rounded-2xl shadow-2xl w-full max-w-sm p-6 ${dk?'bg-gray-800':'bg-white'}`}>
            <div className="text-center mb-5">
              <div className="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl">🗑️</div>
              <h3 className={`font-bold text-lg mb-1 ${dk?'text-white':'text-gray-900'}`}>Bulk Delete {selected.size} Requirement{selected.size>1?'s':''}</h3>
              <p className={`text-sm ${sub}`}>This will permanently delete <strong>{selected.size}</strong> selected requirement{selected.size>1?'s':''}. This action cannot be undone.</p>
            </div>
            {/* Preview list — max 5 shown */}
            <div className={`rounded-xl p-3 mb-5 max-h-36 overflow-y-auto text-xs space-y-1 ${dk?'bg-gray-700':'bg-red-50'}`}>
              {[...selected].slice(0,5).map(id => {
                const r = requirements.find(x=>x.id===id);
                return r ? (
                  <div key={id} className="flex items-center gap-2">
                    <span className="text-red-500">✕</span>
                    <span className={dk?'text-gray-200':'text-gray-700'}>{r.title}</span>
                    <span className={`ml-auto ${sub}`}>{plants.find(p=>p.id===r.plantId)?.name||'—'}</span>
                  </div>
                ) : null;
              })}
              {selected.size > 5 && <p className={`text-center ${sub} pt-1`}>…and {selected.size-5} more</p>}
            </div>
            <div className="flex gap-3">
              <button onClick={()=>setBulkConfirm(false)}
                className={`flex-1 py-2.5 rounded-xl border text-sm font-medium transition-colors ${dk?'border-gray-600 text-gray-300 hover:bg-gray-700':'border-gray-200 text-gray-700 hover:bg-gray-50'}`}>
                Cancel
              </button>
              <button onClick={confirmBulkDelete}
                className="flex-1 py-2.5 rounded-xl bg-red-600 text-white text-sm font-bold hover:bg-red-700 transition-colors">
                Delete {selected.size} Item{selected.size>1?'s':''}
              </button>
            </div>
          </div>
        </div>
      )}

      <RequirementModal open={showAdd} onClose={()=>setShowAdd(false)} onSave={addReq} plants={plants} users={users} dk={dk} categories={cats} />
      <RequirementModal open={!!editReq} onClose={()=>setEditReq(null)} onSave={saveEdit} initial={editReq} plants={plants} users={users} dk={dk} categories={cats} />

      <Modal open={!!viewReq} onClose={()=>setViewReq(null)} title="Requirement Details" wide dk={dk}>
        {viewReq && (() => {
          const plant    = plants.find(p=>p.id===viewReq.plantId);
          const assignedIds = Array.isArray(viewReq.assignedTo) ? viewReq.assignedTo : (viewReq.assignedTo ? [viewReq.assignedTo] : []);
          const assignees = assignedIds.map(id=>users.find(u=>u.id===id)).filter(Boolean);
          const assigneeStr = assignees.length > 0 ? assignees.map(a=>`${a.name} (${a.email})`).join(', ') : 'Unassigned';
          return (
            <div className="space-y-4 text-sm">
              <div className="flex flex-wrap gap-2">
                <Badge label={viewReq.status}   color={STATUS_CLR[viewReq.status]} />
                <Badge label={viewReq.priority} color={PRIORITY_CLR[viewReq.priority]} />
                <Badge label={viewReq.category} color="#6366f1" />
                <Badge label={`L${viewReq.escalationLevel} Escalation`} color="#8b5cf6" />
              </div>
              <p className={`leading-relaxed ${dk?'text-gray-300':'text-gray-700'}`}>{viewReq.description}</p>
              <div className="grid grid-cols-2 gap-4">
                {[['Plant',plant?.name],['State',plant?.state],['Assigned To',assigneeStr],['Due Date',formatDate(viewReq.dueDate)],['Completion Date',viewReq.completionDate?formatDate(viewReq.completionDate):'—'],['Reminder',viewReq.reminderFrequency]].map(([l,v])=>(
                  <div key={l} className={`p-3 rounded-xl ${dk?'bg-gray-700':'bg-gray-50'}`}>
                    <p className={`text-xs uppercase tracking-wide font-semibold mb-0.5 ${sub}`}>{l}</p>
                    <p className={`font-medium ${dk?'text-white':'text-gray-800'}`}>{v||'—'}</p>
                  </div>
                ))}
              </div>

              {/* ── Escalation Email Notifications ── */}
              {(() => {
                const escEmails = viewReq.escalationEmails && typeof viewReq.escalationEmails === 'object'
                  ? viewReq.escalationEmails
                  : (viewReq.escalationEmail ? { 1:[viewReq.escalationEmail], 2:[], 3:[] } : { 1:[], 2:[], 3:[] });
                const hasAny = [1,2,3].some(l => (escEmails[l]||[]).length > 0);
                const levelColors = { 1:'#22c55e', 2:'#f59e0b', 3:'#ef4444' };
                const levelLabels = { 1:'Level 1 – Plant Head', 2:'Level 2 – Regional Manager', 3:'Level 3 – Top Management' };
                if (!hasAny) return null;
                return (
                  <div className={`rounded-xl border p-4 space-y-3 ${dk?'bg-purple-900/20 border-purple-700/40':'bg-purple-50 border-purple-200'}`}>
                    <p className="text-xs font-bold uppercase tracking-widest text-purple-500 flex items-center gap-1.5">📧 Escalation Email Notifications</p>
                    {[1,2,3].map(level => {
                      const emails = escEmails[level] || [];
                      if (!emails.length) return null;
                      return (
                        <div key={level}>
                          <div className="flex items-center gap-1.5 mb-1">
                            <span className="w-4 h-4 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{background:levelColors[level]}}>{level}</span>
                            <p className="text-xs font-semibold" style={{color:levelColors[level]}}>{levelLabels[level]}</p>
                          </div>
                          <div className="flex flex-wrap gap-1.5">
                            {emails.map(e=>(
                              <span key={e} className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs border ${dk?'bg-gray-700 border-gray-600 text-gray-200':'bg-white border-gray-300 text-gray-700'}`}>✉️ {e}</span>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

              {/* ── Legal & Regulatory Section ── */}
              {(viewReq.applicableRule || viewReq.legalClause) && (
                <div className={`rounded-xl border p-4 space-y-3 ${dk?'bg-indigo-900/20 border-indigo-700/40':'bg-indigo-50 border-indigo-200'}`}>
                  <p className="text-xs font-bold uppercase tracking-widest text-indigo-500 flex items-center gap-1.5">⚖️ Legal &amp; Regulatory</p>
                  {viewReq.applicableRule && (
                    <div>
                      <p className={`text-xs uppercase tracking-wide font-semibold mb-0.5 ${dk?'text-indigo-300':'text-indigo-600'}`}>Applicable Rule / Regulation</p>
                      <p className={`text-sm font-medium ${dk?'text-white':'text-gray-800'}`}>{viewReq.applicableRule}</p>
                    </div>
                  )}
                  {viewReq.legalClause && (
                    <div>
                      <p className={`text-xs uppercase tracking-wide font-semibold mb-0.5 ${dk?'text-indigo-300':'text-indigo-600'}`}>Legal Clause / Provision</p>
                      <p className={`text-sm leading-relaxed ${dk?'text-gray-200':'text-gray-700'}`}>{viewReq.legalClause}</p>
                    </div>
                  )}
                </div>
              )}
              {viewReq.evidence?.length > 0 && (
                <div>
                  <p className={`font-semibold mb-2 ${dk?'text-white':'text-gray-800'}`}>📎 Evidence</p>
                  {viewReq.evidence.map(e=>{
                    const fileUrl = e.storageUrl || e.dataUrl;
                    const isImage = fileUrl && (e.mimeType||'').startsWith('image/');
                    const isPdf   = fileUrl && (e.mimeType==='application/pdf' || e.name.toLowerCase().endsWith('.pdf'));
                    const canPreview = isImage || isPdf;
                    const fileIcon = isImage ? '🖼️' : isPdf ? '📑' : '📄';
                    return (
                      <div key={e.id} className={`mb-2 rounded-xl overflow-hidden border ${dk?'border-gray-600 bg-gray-700':'border-gray-200 bg-gray-50'}`}>
                        <div className="flex items-center gap-3 p-3">
                          <span className="text-xl flex-shrink-0">{fileIcon}</span>
                          <div className="flex-1 min-w-0">
                            <p className={`text-sm font-medium ${dk?'text-gray-100':'text-gray-800'}`}>{e.name}</p>
                            <p className={`text-xs ${dk?'text-gray-400':'text-gray-500'}`}>{e.size} · {formatDate(e.uploadedAt)}</p>
                          </div>
                          <div className="flex items-center gap-1.5 flex-shrink-0">
                            {canPreview && (
                              <button onClick={()=>{ window.open(fileUrl, '_blank'); }}
                                className={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${dk?'bg-gray-600 hover:bg-gray-500 text-gray-100':'bg-gray-200 hover:bg-gray-300 text-gray-700'}`}
                                title={`View ${e.name}`}>
                                👁️ View
                              </button>
                            )}
                            <button onClick={()=>downloadEvidence(e)}
                              className={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${dk?'bg-indigo-600 hover:bg-indigo-700 text-white':'bg-indigo-600 hover:bg-indigo-700 text-white'}`}
                              title={`Download ${e.name}`}>
                              ⬇️ Download
                            </button>
                          </div>
                        </div>
                        {isImage && fileUrl && (
                          <div className="px-3 pb-3">
                            <img src={fileUrl} alt={e.name} className="w-full max-h-48 object-contain rounded-lg border" style={{background: dk?'#111827':'#f9fafb'}} />
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })()}
      </Modal>

      {/* ── Filter bar ── */}
      <div className={`${card} p-4`}>
        <div className="flex flex-wrap gap-3 items-center">
          <input value={filters.search} onChange={e=>set('search',e.target.value)} placeholder="🔍 Search requirements…"
            className={`${inputCls} max-w-xs`} />
          <select value={filters.plant} onChange={e=>set('plant',e.target.value)} className={`${selectCls} w-44`}>
            <option value="">All Plants</option>
            {plants.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <select value={filters.status} onChange={e=>set('status',e.target.value)} className={`${selectCls} w-36`}>
            <option value="">All Status</option>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
          <select value={filters.priority} onChange={e=>set('priority',e.target.value)} className={`${selectCls} w-36`}>
            <option value="">All Priority</option>
            {PRIORITIES.map(p=><option key={p}>{p}</option>)}
          </select>
          <button onClick={()=>setShowAdd(true)}
            className="ml-auto px-4 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors flex items-center gap-2 shadow-md shadow-indigo-200">
            <span>+</span> Add Requirement
          </button>
        </div>
        <div className="flex items-center justify-between mt-2">
          <p className={`text-xs ${sub}`}>Showing {filtered.length} of {requirements.length} requirements</p>
          {selected.size > 0 && (
            <p className="text-xs font-semibold text-indigo-500">{selected.size} selected</p>
          )}
        </div>
      </div>

      {/* ── Bulk action bar — appears when items are selected ── */}
      {selected.size > 0 && (
        <div className={`flex items-center justify-between px-4 py-3 rounded-2xl border ${dk?'bg-red-900/20 border-red-700/40':'bg-red-50 border-red-200'}`}>
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center text-red-600 font-bold text-sm">
              {selected.size}
            </div>
            <div>
              <p className={`text-sm font-semibold ${dk?'text-red-300':'text-red-700'}`}>
                {selected.size} requirement{selected.size>1?'s':''} selected
              </p>
              <p className={`text-xs ${sub}`}>
                {filteredIds.every(id=>selected.has(id)) && selected.size === filteredIds.length
                  ? 'All visible requirements selected'
                  : `${filteredIds.filter(id=>selected.has(id)).length} of ${filtered.length} visible`}
              </p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={()=>setSelected(new Set())}
              className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${dk?'text-gray-300 hover:bg-gray-700':'text-gray-600 hover:bg-gray-100'}`}>
              Clear selection
            </button>
            <button onClick={()=>setBulkConfirm(true)}
              className="px-4 py-1.5 rounded-lg bg-red-600 text-white text-xs font-bold hover:bg-red-700 transition-colors flex items-center gap-1.5">
              🗑️ Delete {selected.size} Selected
            </button>
          </div>
        </div>
      )}

      {/* ── Table ── */}
      <div className={`${card} overflow-hidden`}>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className={`text-xs uppercase tracking-wide font-semibold ${dk?'bg-gray-700/60 text-gray-400':'bg-gray-50 text-gray-500'}`}>
                {/* Select-all checkbox column */}
                <th className="pl-4 pr-2 py-3 w-10">
                  <input
                    type="checkbox"
                    checked={allChecked}
                    ref={el => { if (el) el.indeterminate = someChecked; }}
                    onChange={toggleAll}
                    className="w-4 h-4 rounded accent-indigo-600 cursor-pointer"
                    title={allChecked ? 'Deselect all' : 'Select all visible'}
                  />
                </th>
                {['Requirement','Plant','Category','Assigned To','Priority','Status','Due Date','Actions'].map(h=>(
                  <th key={h} className="text-left px-4 py-3 whitespace-nowrap">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className={`divide-y ${dk?'divide-gray-700':'divide-gray-100'}`}>
              {filtered.length === 0 && (
                <tr><td colSpan={9} className="text-center py-12 text-gray-400">No requirements found</td></tr>
              )}
              {filtered.map(req => {
                const plant    = plants.find(p=>p.id===req.plantId);
                const assignedIds = Array.isArray(req.assignedTo) ? req.assignedTo : (req.assignedTo ? [req.assignedTo] : []);
                const assignees = assignedIds.map(id=>users.find(u=>u.id===id)).filter(Boolean);
                const dl       = daysLeft(req.dueDate);
                const isSelected = selected.has(req.id);
                return (
                  <tr key={req.id}
                    className={`transition-colors ${isSelected
                      ? dk?'bg-red-900/20':'bg-red-50'
                      : dk?'hover:bg-gray-700/50':'hover:bg-slate-50'}`}>
                    {/* Row checkbox */}
                    <td className="pl-4 pr-2 py-3">
                      <input
                        type="checkbox"
                        checked={isSelected}
                        onChange={()=>toggleOne(req.id)}
                        className="w-4 h-4 rounded accent-indigo-600 cursor-pointer"
                      />
                    </td>
                    <td className="px-4 py-3">
                      <p className="font-medium max-w-[200px] truncate" title={req.title}>{req.title}</p>
                      <div className="flex items-center gap-2 flex-wrap">
                        {req.evidence?.length>0 && <span className={`text-xs ${sub}`}>📎 {req.evidence.length} file(s)</span>}
                        {req.applicableRule && <span className="text-xs text-indigo-500 font-medium" title={req.applicableRule}>⚖️ Rule</span>}
                      </div>
                    </td>
                    <td className={`px-4 py-3 whitespace-nowrap ${sub}`}>{plant?.name}</td>
                    <td className={`px-4 py-3 whitespace-nowrap ${sub}`}>{req.category}</td>
                    <td className="px-4 py-3">
                      {assignees.length > 0 ? (
                        <div className="flex items-center gap-1 flex-wrap">
                          {assignees.slice(0,3).map(a=>(
                            <div key={a.id} className="flex items-center gap-1" title={a.name}>
                              <div className="w-6 h-6 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs flex-shrink-0">{initials(a.name)}</div>
                              {assignees.length === 1 && <span className={`text-xs ${sub} truncate max-w-[80px]`}>{a.name}</span>}
                            </div>
                          ))}
                          {assignees.length > 3 && <span className={`text-xs font-semibold ${sub}`}>+{assignees.length-3}</span>}
                          {assignees.length > 1 && <span className={`text-xs ${sub}`}>{assignees.length} users</span>}
                        </div>
                      ) : <span className="text-xs text-red-400">Unassigned</span>}
                    </td>
                    <td className="px-4 py-3"><Badge label={req.priority} color={PRIORITY_CLR[req.priority]} /></td>
                    <td className="px-4 py-3"><Badge label={req.status}   color={STATUS_CLR[req.status]} /></td>
                    <td className="px-4 py-3 whitespace-nowrap">
                      <p className={`text-xs ${dl<0?'text-red-500':dl<7?'text-amber-500':sub}`}>{formatDate(req.dueDate)}</p>
                      {dl<0 && <p className="text-xs text-red-400">{Math.abs(dl)}d overdue</p>}
                    </td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-1">
                        <button onClick={()=>setViewReq(req)} className={`p-1.5 rounded-lg text-xs hover:bg-indigo-100 hover:text-indigo-600 transition-colors ${sub}`} title="View">👁️</button>
                        <button onClick={()=>setEditReq(req)} className={`p-1.5 rounded-lg text-xs hover:bg-amber-100 hover:text-amber-600 transition-colors ${sub}`} title="Edit">✏️</button>
                        <button onClick={()=>setDelId(req.id)} className={`p-1.5 rounded-lg text-xs hover:bg-red-100 hover:text-red-600 transition-colors ${sub}`} title="Delete">🗑️</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   ADMIN – USERS
═══════════════════════════════════════════ */
function AdminUsers({ dk, plants, users, updateUsers }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editU,   setEditU]   = useState(null);
  const [delId,   setDelId]   = useState(null);
  const [search,  setSearch]  = useState('');

  const blank = { name:'', email:'', password:'', role:'user', plantId:'', dept:'', phone:'' };
  const [form, setForm] = useState(blank);
  const [saving, setSaving] = useState(false);

  const openAdd = () => { setForm(blank); setShowAdd(true); };
  const openEdit= u  => { setForm({...u}); setEditU(u); setShowAdd(true); };
  const set     = (k,v) => setForm(f=>({...f,[k]:v}));

  const save = async () => {
    if (!form.name||!form.email||!form.password) return;
    setSaving(true);
    await new Promise(r=>setTimeout(r,400));
    if (editU) { updateUsers(users.map(u=>u.id===editU.id?{...u,...form}:u)); }
    else       { updateUsers([...users, {...form, id:`u${Date.now()}`}]); }
    setSaving(false); setShowAdd(false); setEditU(null);
  };
  const confirmDel = () => { updateUsers(users.filter(u=>u.id!==delId)); setDelId(null); };

  const filtered = users.filter(u=>u.name.toLowerCase().includes(search.toLowerCase())||u.email.toLowerCase().includes(search.toLowerCase()));
  const card = `rounded-2xl border shadow-sm ${dk?'bg-gray-800 border-gray-700':'bg-white border-gray-200'}`;
  const sub  = dk?'text-gray-400':'text-gray-500';
  const roleBg = { admin:'bg-indigo-100 text-indigo-700', top_management:'bg-purple-100 text-purple-700', plant_head:'bg-teal-100 text-teal-700', user:'bg-green-100 text-green-700' };

  return (
    <div className="space-y-5">
      <ConfirmModal open={!!delId} message="Delete this user account?" onConfirm={confirmDel} onCancel={()=>setDelId(null)} />

      <Modal open={showAdd} onClose={()=>{setShowAdd(false);setEditU(null);}} title={editU?'Edit User':'Add New User'}>
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <FormField label="Full Name" required><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Full name" className={inputCls} /></FormField>
            <FormField label="Email" required><input type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="email@company.com" className={inputCls} /></FormField>
            <FormField label="Password" required><input type="password" value={form.password} onChange={e=>set('password',e.target.value)} placeholder="Min 8 characters" className={inputCls} /></FormField>
            <FormField label="Phone"><input value={form.phone} onChange={e=>set('phone',e.target.value)} placeholder="+91-XXXXXXXXXX" className={inputCls} /></FormField>
            <FormField label="Role" required>
              <select value={form.role} onChange={e=>set('role',e.target.value)} className={selectCls}>
                <option value="user">Team Member</option>
                <option value="plant_head">Plant Head</option>
                <option value="admin">Admin</option>
              </select>
            </FormField>
            <FormField label="Plant">
              <select value={form.plantId} onChange={e=>set('plantId',e.target.value)} className={selectCls} disabled={form.role==='admin'}>
                <option value="">— None —</option>
                {plants.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </FormField>
            <div className="col-span-2">
              <FormField label="Department"><input value={form.dept} onChange={e=>set('dept',e.target.value)} placeholder="EHS, Legal, Compliance…" className={inputCls} /></FormField>
            </div>
          </div>
          <div className="flex gap-3 pt-4 border-t border-gray-100 dark:border-gray-700">
            <button onClick={()=>{setShowAdd(false);setEditU(null);}} className={`flex-1 py-2.5 rounded-xl border text-sm font-medium transition-colors ${dk?'border-gray-600 text-gray-300 hover:bg-gray-700':'border-gray-200 text-gray-700 hover:bg-gray-50'}`}>Cancel</button>
            <button onClick={save} disabled={saving||!form.name||!form.email||!form.password}
              className="flex-1 py-2.5 rounded-xl bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 disabled:opacity-50 transition-colors">
              {saving?'Saving…':editU?'Update User':'Add User'}
            </button>
          </div>
        </div>
      </Modal>

      <div className={`${card} p-4 flex items-center gap-3`}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search users…" className={`${inputCls} max-w-xs`} />
        <button onClick={openAdd} className="ml-auto px-4 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors flex items-center gap-2 shadow-md shadow-indigo-200">
          <span>+</span> Add User
        </button>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        {filtered.map(u=>{
          const plant = plants.find(p=>p.id===u.plantId);
          return (
            <div key={u.id} className={`${card} p-5`}>
              <div className="flex items-start justify-between mb-3">
                <div className="flex items-center gap-3">
                  <div className="w-11 h-11 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-bold">{initials(u.name)}</div>
                  <div>
                    <p className="font-semibold text-sm">{u.name}</p>
                    <p className={`text-xs ${sub}`}>{u.email}</p>
                  </div>
                </div>
                <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${roleBg[u.role]}`}>
                  {{admin:'Admin',top_management:'Top Mgmt',plant_head:'Head',user:'Member'}[u.role]}
                </span>
              </div>
              <div className="space-y-1.5 mb-4">
                {[['🏭',plant?.name||'Group Level'],['🏢',u.dept||'—'],['📱',u.phone||'—']].map(([i,v])=>(
                  <p key={i} className={`text-xs ${sub} flex items-center gap-2`}><span>{i}</span>{v}</p>
                ))}
              </div>
              <div className="flex gap-2">
                <button onClick={()=>openEdit(u)} className={`flex-1 py-2 rounded-xl text-xs font-medium border transition-colors ${dk?'border-gray-600 hover:bg-gray-700':'border-gray-200 hover:bg-gray-50'}`}>Edit</button>
                <button onClick={()=>setDelId(u.id)} className="flex-1 py-2 rounded-xl text-xs font-medium bg-red-50 text-red-600 border border-red-100 hover:bg-red-100 transition-colors">Delete</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   ADMIN – PLANTS  (Add / Edit / Delete + State Mgmt)
═══════════════════════════════════════════ */
function AdminPlants({ dk, plants, updatePlants, currentUser }) {
  const [editing,    setEditing]    = useState(null);
  const [form,       setForm]       = useState({});
  const [showAdd,    setShowAdd]    = useState(false);
  const [addForm,    setAddForm]    = useState({ name:'', state: ALL_IND_STATES[0] });
  const [delId,      setDelId]      = useState(null);
  /* ── State management ── */
  const [activeTab,  setActiveTab]  = useState('plants'); // 'plants' | 'states'
  const [customStates, setCustomStates] = useState(() => {
    try { const s = localStorage.getItem('customStates'); return s ? JSON.parse(s) : []; } catch(_) { return []; }
  });
  const [newState,   setNewState]   = useState('');
  const [editStateIdx, setEditStateIdx] = useState(null);
  const [editStateVal, setEditStateVal] = useState('');
  const [delStateIdx,  setDelStateIdx]  = useState(null);
  const [toast, setToast] = useState(null);

  const allStates = [...ALL_IND_STATES, ...customStates];

  const showToast = (msg, type='success') => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const saveCustomStates = (arr) => {
    setCustomStates(arr);
    try { localStorage.setItem('customStates', JSON.stringify(arr)); } catch(_) {}
  };

  const startEdit = p => { setEditing(p.id); setForm({ name:p.name, state:p.state }); };
  const saveEdit  = id => {
    if (!form.name.trim()) return;
    const updatedPlant = { ...plants.find(p=>p.id===id), ...form };
    updatePlants(plants.map(p=>p.id===id?updatedPlant:p));
    setEditing(null);
    showToast('Plant updated');
    sendComplianceMail({ trigger:'plant_updated', plant:updatedPlant, req:null, assignee:null, changedBy:currentUser });
  };

  const addPlant = () => {
    if (!addForm.name.trim()) return;
    const newP = { id:`p${Date.now()}`, name:addForm.name.trim(), state:addForm.state, active:true };
    updatePlants([...plants, newP]);
    setAddForm({ name:'', state: ALL_IND_STATES[0] });
    setShowAdd(false);
    showToast(`"${newP.name}" added`);
    sendComplianceMail({ trigger:'plant_added', plant:newP, req:null, assignee:null, changedBy:currentUser });
  };

  const confirmDel = () => {
    const deletedPlant = plants.find(p=>p.id===delId);
    updatePlants(plants.filter(p=>p.id!==delId));
    setDelId(null);
    showToast('Plant deleted');
    if (deletedPlant) sendComplianceMail({ trigger:'plant_deleted', plant:deletedPlant, req:null, assignee:null, changedBy:currentUser });
  };

  /* ── State CRUD ── */
  const addState = () => {
    const t = newState.trim();
    if (!t) return;
    if (allStates.map(s=>s.toLowerCase()).includes(t.toLowerCase())) { showToast('State already exists','error'); return; }
    saveCustomStates([...customStates, t]);
    setNewState('');
    showToast(`"${t}" added`);
  };
  const startEditState = (i) => { setEditStateIdx(i); setEditStateVal(customStates[i]); };
  const saveEditState  = () => {
    const t = editStateVal.trim();
    if (!t) return;
    const updated = customStates.map((s,i)=>i===editStateIdx?t:s);
    saveCustomStates(updated);
    setEditStateIdx(null);
    showToast('State updated');
  };
  const confirmDelState = () => {
    const removed = customStates[delStateIdx];
    saveCustomStates(customStates.filter((_,i)=>i!==delStateIdx));
    setDelStateIdx(null);
    showToast(`"${removed}" deleted`);
  };

  const card = `rounded-2xl border shadow-sm ${dk?'bg-gray-800 border-gray-700':'bg-white border-gray-200'}`;
  const sub  = dk?'text-gray-400':'text-gray-500';

  return (
    <div className="space-y-5">
      <ConfirmModal open={!!delId}
        message={`Delete this plant? All associated requirements will lose their plant reference.`}
        onConfirm={confirmDel} onCancel={()=>setDelId(null)} />
      <ConfirmModal open={delStateIdx!==null}
        message={delStateIdx!==null ? `Delete state "${customStates[delStateIdx]}"? Plants using it will retain their state label.` : ''}

              {label}
            </button>
          ))}
        </div>
      </div>

      {/* ── PLANTS TAB ── */}
      {activeTab==='plants' && (
        <>
          {/* Add Plant button */}
          <div className={`${card} p-4 flex items-center justify-between`}>
            <p className={`text-sm ${sub}`}>
              🏭 {plants.length} plant{plants.length!==1?'s':''} configured
            </p>
            <button onClick={()=>setShowAdd(v=>!v)}
              className="px-4 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors flex items-center gap-2 shadow-md shadow-indigo-200">
              {showAdd?'✕ Cancel':'+ Add Plant'}
            </button>
          </div>

          {showAdd && (
            <div className={`${card} p-5 space-y-4`}>
              <h3 className="font-semibold text-sm" style={{fontFamily:"'Outfit',sans-serif"}}>Add New Plant</h3>

                <div>
                  <label className={`text-xs font-semibold ${sub} uppercase tracking-wide block mb-1`}>Plant Name *</label>

                    placeholder="e.g. Plant D" className={inputCls} />
                </div>
                <div>
                  <label className={`text-xs font-semibold ${sub} uppercase tracking-wide block mb-1`}>State *</label>
                  <select value={addForm.state} onChange={e=>setAddForm(f=>({...f,state:e.target.value}))} className={selectCls}>
                    {allStates.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div className="flex gap-3">
                <button onClick={()=>setShowAdd(false)}
                  className={`flex-1 py-2.5 rounded-xl border text-sm font-medium transition-colors ${dk?'border-gray-600 text-gray-300 hover:bg-gray-700':'border-gray-200 text-gray-700 hover:bg-gray-50'}`}>Cancel</button>
                <button onClick={addPlant} disabled={!addForm.name.trim()}
                  className="flex-1 py-2.5 rounded-xl bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 disabled:opacity-50 transition-colors shadow-md shadow-indigo-200">
                  Add Plant
                </button>
              </div>
            </div>
          )}

          {/* Plants Grid */}
          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            {plants.map((plant, idx) => (
              <div key={plant.id} className={`${card} p-5`}>
                <div className="flex items-start justify-between mb-3">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-indigo-700 flex items-center justify-center text-white font-bold text-sm">
                      {plant.name.charAt(plant.name.length-1) || String.fromCharCode(65+idx)}
                    </div>
                    <div>
                      <p className={`text-xs font-semibold ${sub} uppercase tracking-wide`}>{plant.id}</p>
                      <p className="font-semibold text-sm">{plant.name}</p>
                    </div>
                  </div>
                  <div className="flex gap-1">
                    <button onClick={()=>startEdit(plant)}
                      className={`p-1.5 rounded-lg text-xs transition-colors ${dk?'hover:bg-amber-900/30 text-amber-400':'hover:bg-amber-50 text-amber-600'}`} title="Edit">✏️</button>
                    <button onClick={()=>setDelId(plant.id)}
                      className={`p-1.5 rounded-lg text-xs transition-colors ${dk?'hover:bg-red-900/30 text-red-400':'hover:bg-red-50 text-red-500'}`} title="Delete">🗑️</button>
                  </div>
                </div>
                <p className={`text-xs flex items-center gap-1.5 mb-3 ${sub}`}><span>📍</span>{plant.state}</p>

                {editing === plant.id && (
                  <div className="mt-3 pt-3 border-t border-gray-100 dark:border-gray-700 space-y-3">
                    <div>
                      <label className={`text-xs font-semibold ${sub} uppercase tracking-wide block mb-1`}>Plant Name</label>
                      <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} className={inputCls} placeholder="Plant name" />
                    </div>
                    <div>
                      <label className={`text-xs font-semibold ${sub} uppercase tracking-wide block mb-1`}>State</label>
                      <select value={form.state} onChange={e=>setForm(f=>({...f,state:e.target.value}))} className={selectCls}>
                        {allStates.map(s=><option key={s}>{s}</option>)}
                      </select>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={()=>setEditing(null)} className={`flex-1 py-2 rounded-xl text-xs border transition-colors ${dk?'border-gray-600 hover:bg-gray-700 text-gray-300':'border-gray-200 hover:bg-gray-50 text-gray-700'}`}>Cancel</button>
                      <button onClick={()=>saveEdit(plant.id)} className="flex-1 py-2 rounded-xl text-xs bg-indigo-600 text-white hover:bg-indigo-700 transition-colors font-medium">Save</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </>
      )}

      {/* ── STATES TAB ── */}
      {activeTab==='states' && (
        <div className="space-y-4">
          {/* Info */}
          <div className={`p-4 rounded-2xl border flex items-start gap-3 ${dk?'bg-indigo-900/20 border-indigo-700/40':'bg-indigo-50 border-indigo-100'}`}>
            <span className="text-xl mt-0.5">📍</span>
            <div>
              <p className="text-sm font-semibold text-indigo-600 dark:text-indigo-400">State Management</p>

              </p>
            </div>
          </div>

          {/* Add new state */}
          <div className={`${card} p-5`}>
            <h3 className="font-semibold text-sm mb-3" style={{fontFamily:"'Outfit',sans-serif"}}>Add Custom State / Region</h3>
            <div className="flex gap-3">
              <input value={newState} onChange={e=>setNewState(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addState()}

              <button onClick={addState} disabled={!newState.trim()}
                className="px-5 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 disabled:opacity-40 transition-colors shadow-md shadow-indigo-200 flex-shrink-0">
                + Add
              </button>
            </div>
          </div>

          {/* Built-in states */}
          <div className={`${card} overflow-hidden`}>
            <div className="px-5 py-4 border-b border-gray-100 dark:border-gray-700">
              <h3 className="font-semibold text-sm">Built-in States ({ALL_IND_STATES.length})</h3>
              <p className={`text-xs mt-0.5 ${sub}`}>These are pre-configured and cannot be deleted.</p>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-2 p-4">
              {ALL_IND_STATES.map(s=>(
                <div key={s} className={`px-3 py-2 rounded-xl text-xs font-medium flex items-center gap-1.5 ${dk?'bg-gray-700 text-gray-300':'bg-gray-50 text-gray-600'}`}>
                  <span className="text-indigo-400">📍</span>{s}
                </div>
              ))}
            </div>
          </div>

          {/* Custom states */}
          {customStates.length > 0 && (
            <div className={`${card} overflow-hidden`}>
              <div className="px-5 py-4 border-b border-gray-100 dark:border-gray-700">
                <h3 className="font-semibold text-sm">Custom States / Regions ({customStates.length})</h3>
              </div>
              <div className="divide-y divide-gray-100 dark:divide-gray-700">
                {customStates.map((st, i) => (
                  <div key={i} className={`flex items-center gap-3 px-5 py-3.5 transition-colors ${dk?'hover:bg-gray-700/40':'hover:bg-gray-50'}`}>
                    <span className="text-amber-500">📍</span>
                    {editStateIdx === i ? (
                      <div className="flex items-center gap-2 flex-1">
                        <input value={editStateVal} onChange={e=>setEditStateVal(e.target.value)}
                          onKeyDown={e=>{ if(e.key==='Enter') saveEditState(); if(e.key==='Escape') setEditStateIdx(null); }}
                          autoFocus className={`${inputCls} flex-1 py-1.5 text-sm`} />
                        <button onClick={saveEditState} className="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-semibold hover:bg-indigo-700 transition-colors">Save</button>
                        <button onClick={()=>setEditStateIdx(null)} className={`px-3 py-1.5 rounded-lg text-xs border transition-colors ${dk?'border-gray-600 text-gray-300 hover:bg-gray-700':'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>Cancel</button>
                      </div>
                    ) : (
                      <>
                        <span className="flex-1 text-sm font-medium">{st}</span>
                        <div className="flex items-center gap-1 flex-shrink-0">
                          <button onClick={()=>startEditState(i)}
                            className={`p-1.5 rounded-lg text-xs transition-colors ${dk?'hover:bg-amber-900/30 text-amber-400':'hover:bg-amber-50 text-amber-600'}`} title="Edit">✏️</button>
                          <button onClick={()=>setDelStateIdx(i)}
                            className={`p-1.5 rounded-lg text-xs transition-colors ${dk?'hover:bg-red-900/30 text-red-400':'hover:bg-red-50 text-red-500'}`} title="Delete">🗑️</button>
                        </div>
                      </>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

            <span>EmailJS runs entirely in the browser — no server or backend needed. Free tier: <strong>200 emails/month</strong>. Upgrade at emailjs.com for higher volume. The shared "Recipient Email (To)" above is used as the delivery address.</span>

        </h3>
        <p className={`text-xs mb-4 ${sub}`}>Connect your Firebase project for real-time sync, authentication, and cloud storage.</p>

        {/* Enable toggle */}
        <div className={`flex items-center justify-between p-3 rounded-xl mb-4 ${dk?'bg-gray-700':'bg-gray-50'}`}>
          <div>
            <p className="text-sm font-medium">Enable Firebase Integration</p>
            <p className={`text-xs ${sub}`}>Activate cloud sync &amp; push notifications</p>
          </div>
          <button onClick={()=>set('fbEnabled',!settings.fbEnabled)}
            className={`w-12 h-6 rounded-full transition-colors relative ${settings.fbEnabled?'bg-orange-500':'bg-gray-300'}`}>
            <div className={`absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all ${settings.fbEnabled?'left-6':'left-0.5'}`} />
          </button>
        </div>

        <div className={`space-y-4 transition-opacity ${settings.fbEnabled?'opacity-100':'opacity-50 pointer-events-none'}`}>
          {/* Row 1 */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <FormField label="API Key" required>
              <div className="relative">
                <input
                  type={fbShowSecret?'text':'password'}
                  value={settings.fbApiKey}
                  onChange={e=>set('fbApiKey',e.target.value)}
                  placeholder="AIzaSy…"
                  className={inputCls + ' pr-10'}
                />
                <button type="button" onClick={()=>setFbShowSecret(v=>!v)}
                  className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xs">
                  {fbShowSecret?'🙈':'👁️'}

            </FormField>
            <FormField label="Auth Domain" required>
              <input value={settings.fbAuthDomain} onChange={e=>set('fbAuthDomain',e.target.value)}
                placeholder="your-app.firebaseapp.com" className={inputCls} />
            </FormField>
          </div>

          {/* Row 2 */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <FormField label="Project ID" required>
              <input value={settings.fbProjectId} onChange={e=>set('fbProjectId',e.target.value)}
                placeholder="your-project-id" className={inputCls} />
            </FormField>
            <FormField label="Storage Bucket">
              <input value={settings.fbStorageBucket} onChange={e=>set('fbStorageBucket',e.target.value)}
                placeholder="your-app.appspot.com" className={inputCls} />
            </FormField>
          </div>

          {/* Row 3 */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <FormField label="Messaging Sender ID">
              <input value={settings.fbMessagingSenderId} onChange={e=>set('fbMessagingSenderId',e.target.value)}
                placeholder="1234567890" className={inputCls} />
            </FormField>
            <FormField label="App ID" required>
              <input value={settings.fbAppId} onChange={e=>set('fbAppId',e.target.value)}
                placeholder="1:123…:web:abc…" className={inputCls} />
            </FormField>
          </div>

          {/* Measurement ID (optional) */}
          <FormField label="Measurement ID (Analytics — optional)">
            <input value={settings.fbMeasurementId} onChange={e=>set('fbMeasurementId',e.target.value)}
              placeholder="G-XXXXXXXXXX" className={inputCls} />
          </FormField>

          {/* Generated config preview */}
          {settings.fbProjectId && (
            <div className={`rounded-xl border text-xs font-mono p-4 leading-relaxed overflow-x-auto ${dk?'bg-gray-900 border-gray-600 text-green-400':'bg-gray-900 border-gray-700 text-green-400'}`}>
              <p className="text-gray-500 mb-1">{'// firebaseConfig'}</p>
              <p>{'{'}</p>
              <p className="pl-4">apiKey: <span className="text-yellow-400">"{settings.fbApiKey||'…'}"</span>,</p>
              <p className="pl-4">authDomain: <span className="text-yellow-400">"{settings.fbAuthDomain||'…'}"</span>,</p>
              <p className="pl-4">projectId: <span className="text-yellow-400">"{settings.fbProjectId}"</span>,</p>
              {settings.fbStorageBucket && <p className="pl-4">storageBucket: <span className="text-yellow-400">"{settings.fbStorageBucket}"</span>,</p>}
              {settings.fbMessagingSenderId && <p className="pl-4">messagingSenderId: <span className="text-yellow-400">"{settings.fbMessagingSenderId}"</span>,</p>}
              <p className="pl-4">appId: <span className="text-yellow-400">"{settings.fbAppId||'…'}"</span>{settings.fbMeasurementId?',':''}</p>
              {settings.fbMeasurementId && <p className="pl-4">measurementId: <span className="text-yellow-400">"{settings.fbMeasurementId}"</span></p>}
              <p>{'}'}</p>
            </div>
          )}

          {/* Test connection button + status */}
          <div className="flex items-center gap-3">
            <button onClick={testFirebase} disabled={fbTestStatus==='testing'}
              className={`px-5 py-2.5 rounded-xl text-sm font-semibold transition-colors flex items-center gap-2 ${fbTestStatus==='testing'?'bg-orange-400 text-white cursor-wait':'bg-orange-500 hover:bg-orange-600 text-white'}`}>
              {fbTestStatus==='testing'
                ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin inline-block"/>Testing…</>
                : '🔌 Test Connection'}

            {fbTestStatus==='success' && (
              <span className="flex items-center gap-1.5 text-sm font-medium text-green-600 dark:text-green-400">
                ✅ Connected successfully

            {fbTestStatus==='error' && (
              <span className="flex items-center gap-1.5 text-sm font-medium text-red-500">
                ❌ Connection failed — check your credentials
              </span>

        <div className={`mt-4 p-3 rounded-xl text-xs flex items-start gap-2 ${dk?'bg-blue-900/20 border border-blue-800/30 text-blue-300':'bg-blue-50 border border-blue-100 text-blue-700'}`}>
          <span>ℹ️</span>
          <span>Find these values in your <strong>Firebase Console → Project Settings → Your apps → Firebase SDK snippet</strong>.</span>
        </div>

      <button onClick={save} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200">
