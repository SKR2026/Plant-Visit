}

/* ═══════════════════════════════════════════
   SUPER ADMIN – BULK UPLOAD
═══════════════════════════════════════════ */
function BulkUpload({ dk, plants, users, requirements, updateRequirements, categories: catsProp }) {
  const cats = catsProp || CATEGORIES;
  const [tab,          setTab]          = useState('upload');   // 'upload' | 'preview' | 'history'
  const [dragOver,     setDragOver]     = useState(false);
  const [rawRows,      setRawRows]      = useState([]);
  const [errors,       setErrors]       = useState([]);
  const [filterState,  setFilterState]  = useState('');
  const [filterPlant,  setFilterPlant]  = useState('');
  const [importing,    setImporting]    = useState(false);
  const [toast,        setToast]        = useState(null);
  const [history,      setHistory]      = useState([]);
  const [selRows,      setSelRows]      = useState(new Set());
  const fileRef = useRef();

  const card = `rounded-2xl border shadow-sm ${dk?'bg-gray-800 border-gray-700':'bg-white border-gray-200'}`;
  const sub  = dk?'text-gray-400':'text-gray-500';

  /* ── CSV template columns ── */
  const COLS = ['title','description','category','priority','status','plant_id','state','due_date','reminder_frequency','escalation_level','escalation_email','assigned_email','applicable_rule','legal_clause'];

  /* ── Download template ── */
  const downloadTemplate = () => {
    const sample = [
      COLS.join(','),
      ...plants.slice(0,3).map((p,i) =>
        [
          `"${['Factory License Renewal','Pollution Control NOC','Fire Safety Certificate'][i]}"`,
          `"Ensure statutory compliance for ${p.name}"`,
          cats[i % cats.length],
          PRIORITIES[i % 4],
          'Pending',
          p.id,
          p.state,
          new Date(Date.now()+(i+1)*30*86400000).toISOString().split('T')[0],
          REM_FREQS[i%4],
          (i%3)+1,
          'ceo@legalcomp.com',
          '',
          `"${['Factories Act 1948 – Section 6','Environment Protection Act 1986 – Rule 5','Fire Services Act – Rule 12'][i]}"`,
          `"${['License to be obtained before operations; renewal within 30 days of expiry.','NOC mandatory from State Pollution Control Board.','Fire NOC required as per National Building Code.'][i]}"`,
        ].join(',')
      )
    ].join('\n');
    const blob = new Blob([sample], { type:'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bulk_requirements_template.csv';
    a.click();
  };

  /* ── Parse CSV text ── */
  const parseCSV = (text) => {
    const lines = text.trim().split('\n').filter(Boolean);
    if (lines.length < 2) return { rows:[], errs:['CSV has no data rows.'] };
    const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/ /g,'_'));
    const errs = [];
    const rows = [];
    lines.slice(1).forEach((line, li) => {
      // handle quoted commas
      const cols = [];
      let cur = '', inQ = false;
      for (let ch of line) {
        if (ch==='"') inQ=!inQ;
        else if (ch===',' && !inQ) { cols.push(cur.trim()); cur=''; }
        else cur+=ch;
      }
      cols.push(cur.trim());

      const obj = {};
      headers.forEach((h,i) => { obj[h] = (cols[i]||'').replace(/^"|"$/g,'').trim(); });

      const rowErrs = [];
      if (!obj.title)    rowErrs.push('title missing');
      if (!obj.due_date) rowErrs.push('due_date missing');

      // Resolve plant
      let plant = null;
      if (obj.plant_id) plant = plants.find(p=>p.id===obj.plant_id);
      if (!plant && obj.state) plant = plants.find(p=>p.state.toLowerCase()===obj.state.toLowerCase());
      if (!plant) rowErrs.push(`plant not found (plant_id="${obj.plant_id}", state="${obj.state}")`);

      // Resolve user
      let assignedTo = null;
      if (obj.assigned_email) {
        const u = users.find(u=>u.email.toLowerCase()===obj.assigned_email.toLowerCase());
        if (u) assignedTo = u.id;
        else rowErrs.push(`user email not found: ${obj.assigned_email}`);
      }

      const category = cats.includes(obj.category) ? obj.category : (cats[0]||'Other');
      const priority = PRIORITIES.includes(obj.priority) ? obj.priority : 'Medium';
      const status   = STATUSES.includes(obj.status)     ? obj.status   : 'Pending';
      const escLvl   = [1,2,3].includes(+obj.escalation_level) ? +obj.escalation_level : 1;

      if (rowErrs.length) errs.push({ row: li+2, errs: rowErrs });

      rows.push({
        _rowNum: li+2,
        _valid:  rowErrs.length === 0,
        _plant:  plant,
        _assignedTo: assignedTo,
        title:            obj.title,
        description:      obj.description || '',
        category,
        priority,
        status,
        plantId:          plant?.id || '',
        state:            plant?.state || obj.state,
        dueDate:          obj.due_date,
        reminderFrequency: REM_FREQS.includes(obj.reminder_frequency) ? obj.reminder_frequency : 'Weekly',
        escalationLevel:  escLvl,
        escalationEmail:  obj.escalation_email || '',
        assignedTo: assignedTo ? [assignedTo] : [],
        applicableRule:   obj.applicable_rule || '',
        legalClause:      obj.legal_clause || '',
      });
    });
    return { rows, errs };
  };

  /* ── Handle file ── */
  const handleFile = (file) => {
    if (!file || !file.name.endsWith('.csv')) {
      showToast('Please upload a valid .csv file.', 'error'); return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      const { rows, errs } = parseCSV(e.target.result);
      setRawRows(rows);
      setErrors(errs);
      setSelRows(new Set(rows.filter(r=>r._valid).map(r=>r._rowNum)));
      setTab('preview');
    };
    reader.readAsText(file);
  };

  const onDrop = e => {
    e.preventDefault(); setDragOver(false);
    handleFile(e.dataTransfer.files[0]);
  };

  /* ── Filter preview rows ── */
  const visibleRows = rawRows.filter(r => {
    if (filterState && r.state !== filterState) return false;
    if (filterPlant && r.plantId !== filterPlant) return false;
    return true;
  });

  const uniqueStates = [...new Set(rawRows.map(r=>r.state).filter(Boolean))].sort();
  const uniquePlants = [...new Set(rawRows.map(r=>r.plantId).filter(Boolean))];

  /* ── Toggle row selection ── */
  const toggleRow  = rn => setSelRows(s => { const n=new Set(s); n.has(rn)?n.delete(rn):n.add(rn); return n; });
  const toggleAll  = () => {
    const validVisible = visibleRows.filter(r=>r._valid).map(r=>r._rowNum);
    const allSel = validVisible.every(rn=>selRows.has(rn));
    setSelRows(s => {
      const n=new Set(s);
      validVisible.forEach(rn => allSel ? n.delete(rn) : n.add(rn));
      return n;
    });
  };

  /* ── Import selected rows ── */
  const showToast = (msg, type='success') => {
    setToast({ msg, type });
    setTimeout(()=>setToast(null), 4000);
  };

  const importSelected = async () => {
    const toImport = rawRows.filter(r=>selRows.has(r._rowNum) && r._valid);
    if (!toImport.length) { showToast('No valid rows selected.','error'); return; }
    setImporting(true);
    await new Promise(r=>setTimeout(r,700));
    const newReqs = toImport.map(r => ({
      id: `r${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
      title:            r.title,
      description:      r.description,
      category:         r.category,
      priority:         r.priority,
      status:           r.status,
      plantId:          r.plantId,
      assignedTo:       r._assignedTo,
      dueDate:          r.dueDate,
      reminderFrequency:r.reminderFrequency,
      escalationLevel:  r.escalationLevel,
      escalationEmail:  r.escalationEmail,
      applicableRule:   r.applicableRule || '',
      legalClause:      r.legalClause || '',
      createdAt:        new Date().toISOString(),
      evidence:         [],
      comments:         [],
    }));
    updateRequirements([...newReqs, ...requirements]);
    const entry = {
      id: `h${Date.now()}`,
      date: new Date().toLocaleString('en-IN'),
      total: rawRows.length,
      imported: toImport.length,
      skipped: rawRows.length - toImport.length,
      plants: [...new Set(toImport.map(r=>r._plant?.name).filter(Boolean))].join(', '),
      states: [...new Set(toImport.map(r=>r.state).filter(Boolean))].join(', '),
    };
    setHistory(h=>[entry,...h]);
    setImporting(false);
    showToast(`✅ ${toImport.length} requirement${toImport.length!==1?'s':''} imported successfully across ${[...new Set(toImport.map(r=>r.state))].length} state(s)!`);
    setRawRows([]); setErrors([]); setSelRows(new Set()); setTab('upload');
  };

  const validCount   = rawRows.filter(r=>r._valid).length;
  const invalidCount = rawRows.length - validCount;
  const selectedValid= rawRows.filter(r=>selRows.has(r._rowNum) && r._valid).length;

  return (
    <div className="space-y-5">
      {/* Toast */}
      {toast && (
        <div className={`fixed top-5 right-5 z-[100] px-5 py-3.5 rounded-2xl shadow-2xl text-sm font-semibold flex items-center gap-2 transition-all
          ${toast.type==='error'?'bg-red-500 text-white':'bg-green-500 text-white'}`}>
          {toast.msg}
        </div>
      )}

      {/* Header */}
      <div className={`${card} p-5`}>
        <div className="flex flex-wrap items-center justify-between gap-4">
          <div>
            <h2 className="text-xl font-bold flex items-center gap-2" style={{fontFamily:"'Outfit',sans-serif"}}>
              <span>📤</span> Bulk Upload Requirements
            </h2>
            <p className={`text-sm mt-1 ${sub}`}>
              Upload a CSV to create compliance requirements for multiple plants across different states in one go — Super Admin only.
            </p>
          </div>
          <button onClick={downloadTemplate}
            className="px-4 py-2.5 rounded-xl border-2 border-indigo-500 text-indigo-600 dark:text-indigo-400 text-sm font-semibold hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-colors flex items-center gap-2">
            ⬇️ Download CSV Template
          </button>
        </div>

        {/* Tabs */}
        <div className="flex gap-1 mt-5 p-1 rounded-xl bg-gray-100 dark:bg-gray-700 w-fit">
          {[['upload','📁 Upload'],['preview','🔍 Preview & Import'],['history','🕓 Import History']].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              className={`px-4 py-1.5 rounded-lg text-sm font-semibold transition-all ${tab===id?(dk?'bg-gray-600 text-white shadow':'bg-white text-indigo-700 shadow'):(dk?'text-gray-400':'text-gray-500')}`}>
              {label}{id==='preview' && rawRows.length>0 ? ` (${rawRows.length})` : ''}
            </button>
          ))}
        </div>
      </div>

      {/* ── TAB: UPLOAD ── */}
      {tab==='upload' && (
        <div className="space-y-5">
          {/* Drop zone */}
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={onDrop}
            onClick={()=>fileRef.current.click()}
            className={`${card} p-12 text-center cursor-pointer transition-all border-2 border-dashed
              ${dragOver?'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20':'border-gray-300 dark:border-gray-600 hover:border-indigo-400'}`}>
            <input ref={fileRef} type="file" accept=".csv" className="hidden"
              onChange={e=>{ if(e.target.files[0]) handleFile(e.target.files[0]); e.target.value=''; }} />
            <div className="text-5xl mb-4">{dragOver ? '📂' : '📁'}</div>
            <p className="text-lg font-bold text-gray-700 dark:text-gray-200 mb-1">
              {dragOver ? 'Drop CSV here!' : 'Drag & Drop your CSV file'}
            </p>
            <p className={`text-sm ${sub}`}>or click to browse · .csv files only</p>
          </div>

          {/* Format guide */}
          <div className={`${card} p-5`}>
            <h3 className="font-semibold mb-3 flex items-center gap-2" style={{fontFamily:"'Outfit',sans-serif"}}>
              <span>📋</span> CSV Column Reference
            </h3>
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead>
                  <tr className={`${dk?'bg-gray-700 text-gray-300':'bg-gray-50 text-gray-500'}`}>
                    {['Column','Type','Required','Notes'].map(h=><th key={h} className="text-left px-3 py-2 font-semibold uppercase tracking-wide">{h}</th>)}
                  </tr>
                </thead>
                <tbody className={`divide-y ${dk?'divide-gray-700':'divide-gray-100'}`}>
                  {[
                    ['title','Text','✅ Yes','Requirement title'],
                    ['description','Text','No','Detailed description'],
                    ['category','Enum','No',cats.join(', ')],
                    ['priority','Enum','No','Critical / High / Medium / Low'],
                    ['status','Enum','No','Pending / In Progress / Completed / Overdue'],
                    ['plant_id','ID','⚡ Or state','Plant ID (e.g. p1, p2…)'],
                    ['state','Text','⚡ Or plant_id','State name — auto-matches plant'],
                    ['due_date','YYYY-MM-DD','✅ Yes','e.g. 2025-09-30'],
                    ['reminder_frequency','Enum','No','Daily / Weekly / Bi-Weekly / Monthly'],
                    ['escalation_level','1/2/3','No','1=Plant Head, 2=Regional, 3=Top Mgmt'],
                    ['escalation_email','Email','No','Override escalation email'],
                    ['assigned_email','Email','No','Must match an existing user email'],
                    ['applicable_rule','Text','No','e.g. Factories Act 1948 – Section 6'],
                    ['legal_clause','Text','No','Specific clause or provision mandating compliance'],
                  ].map(([col,type,req,notes])=>(
                    <tr key={col} className={dk?'hover:bg-gray-700/50':'hover:bg-gray-50'}>
                      <td className="px-3 py-2 font-mono text-indigo-500 font-semibold">{col}</td>
                      <td className={`px-3 py-2 ${sub}`}>{type}</td>
                      <td className="px-3 py-2">{req}</td>
                      <td className={`px-3 py-2 ${sub}`}>{notes}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className={`mt-4 p-3 rounded-xl text-xs ${dk?'bg-blue-900/20 border border-blue-800 text-blue-300':'bg-blue-50 border border-blue-100 text-blue-700'}`}>
              💡 <strong>Tip:</strong> You can target a plant by <code>plant_id</code> OR by <code>state</code> name — the system will auto-match. One row = one requirement.
            </div>
          </div>

          {/* Plant directory */}
          <div className={`${card} p-5`}>
            <h3 className="font-semibold mb-3 flex items-center gap-2" style={{fontFamily:"'Outfit',sans-serif"}}>
              <span>🏭</span> Available Plants & States
            </h3>
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-2">
              {plants.map(p=>(
                <div key={p.id} className={`p-2.5 rounded-xl border text-xs ${dk?'bg-gray-700/50 border-gray-600':'bg-gray-50 border-gray-200'}`}>
                  <p className="font-semibold text-indigo-500 mb-0.5">{p.id}</p>
                  <p className="font-medium">{p.name}</p>
                  <p className={sub}>{p.state}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── TAB: PREVIEW ── */}
      {tab==='preview' && (
        <div className="space-y-4">
          {/* Summary strip */}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            {[
              { label:'Total Rows',   value:rawRows.length,   color:'#6366f1', icon:'📄' },
              { label:'Valid',        value:validCount,        color:'#22c55e', icon:'✅' },
              { label:'Errors',       value:invalidCount,      color:'#ef4444', icon:'❌' },
              { label:'Selected',     value:selectedValid,     color:'#f59e0b', icon:'☑️' },
            ].map(s=>(
              <div key={s.label} className={`${card} p-4 flex items-center gap-3`}>
                <span className="text-2xl">{s.icon}</span>
                <div>
                  <p className="text-2xl font-bold" style={{color:s.color}}>{s.value}</p>
                  <p className={`text-xs ${sub}`}>{s.label}</p>
                </div>
              </div>
            ))}
          </div>

          {/* Validation errors */}
          {errors.length > 0 && (
            <div className={`${card} p-4`}>
              <h4 className="font-semibold text-red-500 mb-2 flex items-center gap-2">❌ Validation Errors ({errors.length} rows)</h4>
              <div className="space-y-1.5 max-h-36 overflow-y-auto">
                {errors.map((e,i)=>(
                  <div key={i} className={`text-xs p-2 rounded-lg ${dk?'bg-red-900/20 border border-red-800 text-red-300':'bg-red-50 border border-red-200 text-red-600'}`}>
                    <strong>Row {e.row}:</strong> {e.errs.join(' · ')}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Filters + actions */}
          <div className={`${card} p-4 flex flex-wrap items-center gap-3`}>
            <select value={filterState} onChange={e=>{setFilterState(e.target.value);setFilterPlant('');}} className={`${selectCls} max-w-[180px]`}>
              <option value="">All States ({uniqueStates.length})</option>
              {uniqueStates.map(s=><option key={s} value={s}>📍 {s}</option>)}
            </select>
            <select value={filterPlant} onChange={e=>setFilterPlant(e.target.value)} className={`${selectCls} max-w-[180px]`}>
              <option value="">All Plants</option>
              {uniquePlants.map(pid=>{ const p=plants.find(x=>x.id===pid); return p ? <option key={pid} value={pid}>🏭 {p.name}</option>:null; })}
            </select>
            <span className={`text-xs ${sub}`}>Showing {visibleRows.length} of {rawRows.length}</span>
            <div className="ml-auto flex gap-2">
              <button onClick={()=>{ setRawRows([]); setErrors([]); setSelRows(new Set()); setTab('upload'); }}
                className={`px-3 py-2 rounded-xl text-sm border font-medium transition-colors ${dk?'border-gray-600 hover:bg-gray-700 text-gray-300':'border-gray-200 hover:bg-gray-50 text-gray-700'}`}>

                {importing ? '⏳ Importing…' : `⬆️ Import ${selectedValid} Requirement${selectedValid!==1?'s':''}`}

          {/* Preview table */}
          <div className={`${card} overflow-hidden`}>
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead>
                  <tr className={`${dk?'bg-gray-700/60 text-gray-400':'bg-gray-50 text-gray-500'} text-xs uppercase tracking-wide font-semibold`}>
                    <th className="px-3 py-3 text-left">
                      <input type="checkbox"
                        checked={visibleRows.filter(r=>r._valid).length>0 && visibleRows.filter(r=>r._valid).every(r=>selRows.has(r._rowNum))}
                        onChange={toggleAll} className="rounded" />
                    </th>
                    {['Row','Title','Plant','State','Category','Priority','Status','Due Date','Assigned To','⚖️ Rule','Valid'].map(h=>(
                      <th key={h} className="px-3 py-3 text-left whitespace-nowrap">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody className={`divide-y ${dk?'divide-gray-700':'divide-gray-100'}`}>
                  {visibleRows.length === 0 && (
                    <tr><td colSpan={12} className="text-center py-10 text-gray-400">No rows match filters</td></tr>
                  )}
                  {visibleRows.map(row => {
                    const isSelected = selRows.has(row._rowNum);
                    const assignee   = users.find(u=>u.id===row._assignedTo);
                    return (
                      <tr key={row._rowNum}
                        className={`transition-colors ${isSelected&&row._valid?(dk?'bg-indigo-900/20':'bg-indigo-50/60'):''}
                          ${dk?'hover:bg-gray-700/50':'hover:bg-slate-50'} ${!row._valid?'opacity-60':''}`}>
                        <td className="px-3 py-2">
                          <input type="checkbox" checked={isSelected && row._valid} disabled={!row._valid}
                            onChange={()=>toggleRow(row._rowNum)} className="rounded" />
                        </td>
                        <td className={`px-3 py-2 font-mono ${sub}`}>{row._rowNum}</td>
                        <td className="px-3 py-2 font-medium max-w-[160px]">
                          <p className="truncate" title={row.title}>{row.title}</p>
                        </td>
                        <td className={`px-3 py-2 ${sub} whitespace-nowrap`}>{row._plant?.name || <span className="text-red-400">⚠️ Unknown</span>}</td>
                        <td className={`px-3 py-2 ${sub} whitespace-nowrap`}>
                          {row.state ? <span className="flex items-center gap-1">📍{row.state}</span> : <span className="text-red-400">—</span>}
                        </td>
                        <td className={`px-3 py-2 ${sub}`}>{row.category}</td>
                        <td className="px-3 py-2"><Badge label={row.priority} color={PRIORITY_CLR[row.priority]||'#6366f1'} /></td>
                        <td className="px-3 py-2"><Badge label={row.status}   color={STATUS_CLR[row.status]  ||'#6366f1'} /></td>
                        <td className={`px-3 py-2 ${sub} whitespace-nowrap`}>{row.dueDate||'—'}</td>
                        <td className={`px-3 py-2 ${sub}`}>{assignee?.name||<span className="text-amber-500">Unassigned</span>}</td>
                        <td className="px-3 py-2 max-w-[160px]">
                          {row.applicableRule
                            ? <span className="text-indigo-500 text-xs truncate block" title={row.applicableRule}>⚖️ {row.applicableRule}</span>
                            : <span className={`text-xs ${sub}`}>—</span>}
                        </td>
                        <td className="px-3 py-2 text-center">
                          {row._valid
                            ? <span className="text-green-500 font-bold text-sm">✓</span>
                            : <span className="text-red-500 font-bold text-sm" title={errors.find(e=>e.row===row._rowNum)?.errs?.join(', ')}>✗</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* ── TAB: HISTORY ── */}
      {tab==='history' && (
        <div className={`${card} overflow-hidden`}>
          {history.length === 0 ? (
            <div className="text-center py-16">
              <p className="text-4xl mb-3">🕓</p>
              <p className="font-semibold text-gray-500">No import history yet</p>
              <p className={`text-sm mt-1 ${sub}`}>Completed imports will appear here</p>
            </div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className={`text-xs uppercase tracking-wide font-semibold ${dk?'bg-gray-700/60 text-gray-400':'bg-gray-50 text-gray-500'}`}>
                    {['Date / Time','Imported','Skipped','Plants Covered','States Covered','Total Rows'].map(h=>(
                      <th key={h} className="text-left px-4 py-3 whitespace-nowrap">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody className={`divide-y ${dk?'divide-gray-700':'divide-gray-100'}`}>
                  {history.map(h=>(
                    <tr key={h.id} className={dk?'hover:bg-gray-700/50':'hover:bg-slate-50'}>
                      <td className={`px-4 py-3 text-xs ${sub} whitespace-nowrap`}>🕓 {h.date}</td>
                      <td className="px-4 py-3"><Badge label={`${h.imported} imported`} color="#22c55e" /></td>
                      <td className="px-4 py-3"><Badge label={`${h.skipped} skipped`}  color={h.skipped>0?'#ef4444':'#9ca3af'} /></td>

                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   ADMIN – CATEGORIES
═══════════════════════════════════════════ */
function AdminCategories({ dk, categories, updateCategories }) {
  const [cats,     setCats]     = useState(categories);
  const [newCat,   setNewCat]   = useState('');
  const [editIdx,  setEditIdx]  = useState(null);
  const [editVal,  setEditVal]  = useState('');
  const [delIdx,   setDelIdx]   = useState(null);
  const [toast,    setToast]    = useState(null);

  // Keep local state in sync if parent changes
  useEffect(()=>{ setCats(categories); }, [categories]);

  const showToast = (msg, type='success') => {
    setToast({msg, type});
    setTimeout(()=>setToast(null), 3000);
  };

  const save = (updated) => {
    setCats(updated);
    CATEGORIES = updated; // update global
    localStorage.setItem('categories', JSON.stringify(updated));
    updateCategories(updated);
  };

  const addCat = () => {
    const trimmed = newCat.trim();
    if (!trimmed) return;
    if (cats.map(c=>c.toLowerCase()).includes(trimmed.toLowerCase())) {
      showToast('Category already exists', 'error'); return;
    }
    save([...cats, trimmed]);
    setNewCat('');
    showToast(`"${trimmed}" added`);
  };

  const startEdit = (i) => { setEditIdx(i); setEditVal(cats[i]); };

  const saveEdit = () => {
    const trimmed = editVal.trim();
    if (!trimmed) return;
    if (cats.map((c,i)=>i!==editIdx?c.toLowerCase():null).filter(Boolean).includes(trimmed.toLowerCase())) {
      showToast('Category name already exists', 'error'); return;
    }
    const updated = cats.map((c,i)=>i===editIdx?trimmed:c);
    save(updated);
    setEditIdx(null);
    showToast(`Updated to "${trimmed}"`);
  };

  const confirmDel = () => {
    const removed = cats[delIdx];
    save(cats.filter((_,i)=>i!==delIdx));
    setDelIdx(null);
    showToast(`"${removed}" deleted`);
  };

  const moveUp = (i) => {
    if (i===0) return;
    const updated = [...cats];
    [updated[i-1],updated[i]]=[updated[i],updated[i-1]];
    save(updated);
  };
  const moveDown = (i) => {
    if (i===cats.length-1) return;
    const updated = [...cats];
    [updated[i+1],updated[i]]=[updated[i],updated[i+1]];
    save(updated);
  };

  const card = `rounded-2xl border shadow-sm ${dk?'bg-gray-800 border-gray-700':'bg-white border-gray-200'}`;
  const sub  = dk?'text-gray-400':'text-gray-500';
  const COLORS_POOL = ['#6366f1','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316','#84cc16','#0ea5e9','#a855f7'];

  return (
    <div className="space-y-5">
      <ConfirmModal
        open={delIdx!==null}
        message={delIdx!==null ? `Delete category "${cats[delIdx]}"? Requirements using it will retain the label but it won't appear in new dropdowns.` : ''}
        onConfirm={confirmDel}
        onCancel={()=>setDelIdx(null)}
      />

      {/* Toast */}
      {toast && (
        <div className={`fixed top-5 right-5 z-[100] px-5 py-3 rounded-xl shadow-xl text-sm font-semibold flex items-center gap-2 transition-all
          ${toast.type==='error'?'bg-red-500 text-white':'bg-green-500 text-white'}`}>
          {toast.type==='error'?'❌':'✅'} {toast.msg}
        </div>
      )}

      {/* Info banner */}
      <div className={`p-4 rounded-2xl border flex items-start gap-3 ${dk?'bg-indigo-900/20 border-indigo-700/40':'bg-indigo-50 border-indigo-100'}`}>
        <span className="text-xl mt-0.5">🏷️</span>
        <div>
          <p className="text-sm font-semibold text-indigo-600 dark:text-indigo-400">Compliance Categories</p>
          <p className={`text-xs mt-0.5 ${sub}`}>Categories are used to classify requirements across all plants. Changes apply immediately to all dropdowns. Existing requirements retain their category label.</p>
        </div>
      </div>

      {/* Add new category */}
      <div className={`${card} p-5`}>
        <h3 className="font-semibold text-sm mb-3" style={{fontFamily:"'Outfit',sans-serif"}}>Add New Category</h3>
        <div className="flex gap-3">
          <input
            value={newCat}
            onChange={e=>setNewCat(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addCat()}
            placeholder="e.g. Water Management, ISO Compliance…"
            className={`${inputCls} flex-1`}
          />
          <button
            onClick={addCat}
            disabled={!newCat.trim()}
            className="px-5 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 disabled:opacity-40 transition-colors shadow-md shadow-indigo-200 flex-shrink-0"
          >
            + Add
          </button>
        </div>
      </div>

      {/* Categories list */}
      <div className={`${card} overflow-hidden`}>
        <div className="px-5 py-4 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between">
          <div>
            <h3 className="font-semibold text-sm" style={{fontFamily:"'Outfit',sans-serif"}}>All Categories</h3>
            <p className={`text-xs mt-0.5 ${sub}`}>{cats.length} categor{cats.length===1?'y':'ies'} · drag order affects chart display</p>
          </div>
        </div>

        {cats.length === 0 ? (
          <div className="text-center py-16">
            <p className="text-4xl mb-3">📂</p>
            <p className="font-semibold text-gray-500">No categories yet</p>
            <p className={`text-sm mt-1 ${sub}`}>Add your first category above</p>
          </div>
        ) : (
          <div className="divide-y divide-gray-100 dark:divide-gray-700">
            {cats.map((cat, i) => (
              <div key={i} className={`flex items-center gap-3 px-5 py-3.5 transition-colors ${dk?'hover:bg-gray-700/40':'hover:bg-gray-50'}`}>
                {/* Color dot */}
                <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background: COLORS_POOL[i % COLORS_POOL.length]}} />

                {/* Order controls */}
                <div className="flex flex-col gap-0.5">
                  <button onClick={()=>moveUp(i)} disabled={i===0}
                    className={`text-xs leading-none px-1 rounded transition-colors ${i===0?'opacity-20 cursor-not-allowed':dk?'hover:bg-gray-600 text-gray-300':'hover:bg-gray-200 text-gray-500'}`}>▲</button>
                  <button onClick={()=>moveDown(i)} disabled={i===cats.length-1}
                    className={`text-xs leading-none px-1 rounded transition-colors ${i===cats.length-1?'opacity-20 cursor-not-allowed':dk?'hover:bg-gray-600 text-gray-300':'hover:bg-gray-200 text-gray-500'}`}>▼</button>
                </div>

                {/* Index badge */}
                <span className={`text-xs w-5 text-center font-mono ${sub}`}>{i+1}</span>

                {/* Edit inline or display */}
                {editIdx === i ? (
                  <div className="flex items-center gap-2 flex-1">
                    <input
                      value={editVal}
                      onChange={e=>setEditVal(e.target.value)}
                      onKeyDown={e=>{ if(e.key==='Enter') saveEdit(); if(e.key==='Escape') setEditIdx(null); }}
                      autoFocus
                      className={`${inputCls} flex-1 py-1.5 text-sm`}
                    />
                    <button onClick={saveEdit} className="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-semibold hover:bg-indigo-700 transition-colors">Save</button>
                    <button onClick={()=>setEditIdx(null)} className={`px-3 py-1.5 rounded-lg text-xs border transition-colors ${dk?'border-gray-600 text-gray-300 hover:bg-gray-700':'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>Cancel</button>
                  </div>
                ) : (
                  <>
                    <span className="flex-1 text-sm font-medium">{cat}</span>
                    <div className="flex items-center gap-1 flex-shrink-0">
                      <button onClick={()=>startEdit(i)}
                        className={`p-1.5 rounded-lg text-xs transition-colors ${dk?'hover:bg-amber-900/30 text-amber-400':'hover:bg-amber-50 text-amber-600'}`} title="Edit">✏️</button>
                      <button onClick={()=>setDelIdx(i)}
                        className={`p-1.5 rounded-lg text-xs transition-colors ${dk?'hover:bg-red-900/30 text-red-400':'hover:bg-red-50 text-red-500'}`} title="Delete">🗑️</button>
                    </div>
                  </>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

    { id:'users',        icon:'👥', label:'Users' },
    { id:'plants',       icon:'🏭', label:'Plants' },
    { id:'categories',   icon:'🏷️', label:'Categories' },
    { id:'settings',     icon:'⚙️', label:'Settings' },
  ];

  const pages = {
    overview:     <AdminOverview dk={dk} plants={plants} users={users} requirements={requirements} categories={categories} />,

    categories:   <AdminCategories dk={dk} categories={categories} updateCategories={updateCategories} />,
    settings:     <AdminSettings dk={dk} />,
  };

  // Notification click: navigate to requirements page and open the requirement
  const [notifReqId, setNotifReqId] = React.useState(null);

    setActivePage('requirements');

  const pagesWithNotif = {

    requirements: <AdminRequirements dk={dk} plants={plants} users={users} requirements={requirements} updateRequirements={updateRequirements} categories={categories} openReqId={notifReqId} onNotifReqOpened={()=>setNotifReqId(null)} />,

  return (

    setActivePage('requirements');
    setNotifReqId(reqId);

        <p className={`text-xs mt-0.5 ${sub}`}>Your plant compliance dashboard · {new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
      </div>
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-4">
        <StatCard dk={dk} label="Total Requirements" value={total} icon="📋" color="bg-indigo-100 text-indigo-600" sub={myPlant?.name} />
        <StatCard dk={dk} label="Compliance Rate"    value={total?`${Math.round(completed/total*100)}%`:'—'} icon="✅" color="bg-green-100 text-green-600" sub={`${completed} completed`} />
        <StatCard dk={dk} label="Overdue"            value={overdue} icon="🚨" color="bg-red-100 text-red-600" sub="Needs attention" />
        <StatCard dk={dk} label="Team Members"       value={teamUsers.length} icon="👥" color="bg-purple-100 text-purple-600" sub="Assigned users" />
      </div>
      <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
        <div className={card}>
          <h3 className="font-semibold mb-4" style={{fontFamily:"'Outfit',sans-serif"}}>Status Distribution</h3>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart>
              <Pie data={statusPie} cx="50%" cy="50%" outerRadius={80} innerRadius={45} paddingAngle={3} dataKey="value"
                isAnimationActive={true}>
                {statusPie.map((e,i)=><Cell key={i} fill={Object.values(STATUS_CLR)[i]} />)}
              </Pie>
              <Tooltip {...TT} formatter={(value, name) => [`${value} (${total ? Math.round(value/total*100) : 0}%)`, name]} />
            </PieChart>
          </ResponsiveContainer>
        </div>
        <div className={card}>
          <h3 className="font-semibold mb-4" style={{fontFamily:"'Outfit',sans-serif"}}>Team Workload</h3>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={teamBar} barSize={20}>
              <CartesianGrid strokeDasharray="3 3" stroke={dk?'#374151':'#f1f5f9'} vertical={false}/>
              <XAxis dataKey="name" tick={{fontSize:11,fill:dk?'#9ca3af':'#64748b'}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fontSize:11,fill:dk?'#9ca3af':'#64748b'}} axisLine={false} tickLine={false}/>
              <Tooltip {...TT} />
              <Bar dataKey="Total" fill="#6366f130" radius={[4,4,0,0]}/>
              <Bar dataKey="Done"  fill="#22c55e"   radius={[4,4,0,0]}/>
              <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:12}} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
      {overdue > 0 && (
        <div className={card}>
          <h3 className="font-semibold mb-3 text-red-500">🚨 Overdue in {myPlant?.name}</h3>
          <div className="space-y-2">
            {myReqs.filter(r=>r.status==='Overdue').map(r=>{
              const assignedIds = Array.isArray(r.assignedTo) ? r.assignedTo : (r.assignedTo ? [r.assignedTo] : []);
              const assignees = assignedIds.map(id=>users.find(u=>u.id===id)).filter(Boolean);
              return (
                <div key={r.id} className={`flex items-center justify-between p-3 rounded-xl ${dk?'bg-red-900/20 border border-red-800/30':'bg-red-50 border border-red-100'}`}>
                  <div>
                    <p className="text-sm font-medium text-red-600">{r.title}</p>
                    <p className={`text-xs ${sub}`}>Assigned: {assignees.length>0?assignees.map(a=>a.name).join(', '):'Unassigned'} · Due: {formatDate(r.dueDate)}</p>
                  </div>
                  <Badge label={`L${r.escalationLevel}`} color="#8b5cf6" />
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );

  const PHRequirements = () => {
    const [filter, setFilter] = useState('');
    const filtered = myReqs.filter(r=>!filter||r.status===filter);
    return (
      <div className="space-y-4">
        <div className={`${card} p-4 flex gap-3`}>
          <select value={filter} onChange={e=>setFilter(e.target.value)} className={`${selectCls} w-40`}>
            <option value="">All Status</option>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
          <p className={`text-xs self-center ${sub}`}>{filtered.length} requirements</p>
        </div>
        <div className={`${card} overflow-hidden`}>
          <table className="w-full text-sm">
            <thead className={`text-xs uppercase tracking-wide font-semibold ${dk?'bg-gray-700/60 text-gray-400':'bg-gray-50 text-gray-500'}`}>
              <tr>{['Title','Category','Assigned To','Priority','Status','Due Date'].map(h=><th key={h} className="text-left px-4 py-3">{h}</th>)}</tr>
            </thead>
            <tbody className={`divide-y ${dk?'divide-gray-700':'divide-gray-100'}`}>
              {filtered.map(r=>{
                const assignedIds = Array.isArray(r.assignedTo) ? r.assignedTo : (r.assignedTo ? [r.assignedTo] : []);
                const assignees = assignedIds.map(id=>users.find(u=>u.id===id)).filter(Boolean);
                const dl=daysLeft(r.dueDate);
                return (
                  <tr key={r.id} onClick={()=>setSelPHReq(r)}
                    className={`cursor-pointer ${dk?'hover:bg-gray-700/40':'hover:bg-indigo-50/60'} transition-colors`}>
                    <td className="px-4 py-3 font-medium max-w-[220px] truncate">{r.title}</td>
                    <td className={`px-4 py-3 text-xs ${sub}`}>{r.category}</td>
                    <td className="px-4 py-3 text-xs">{assignees.length>0?<div className="flex items-center gap-1 flex-wrap">{assignees.slice(0,3).map(a=><div key={a.id} className="flex items-center gap-1" title={a.name}><div className="w-5 h-5 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs">{initials(a.name)}</div>{assignees.length===1&&<span>{a.name}</span>}</div>)}{assignees.length>3&&<span className={sub}>+{assignees.length-3}</span>}{assignees.length>1&&<span className={sub}>{assignees.length} users</span>}</div>:<span className="text-red-400">Unassigned</span>}</td>
                    <td className="px-4 py-3"><Badge label={r.priority} color={PRIORITY_CLR[r.priority]} /></td>
                    <td className="px-4 py-3"><Badge label={r.status}   color={STATUS_CLR[r.status]}   /></td>
                    <td className={`px-4 py-3 text-xs ${dl<0?'text-red-500':dl<7?'text-amber-500':sub}`}>{formatDate(r.dueDate)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  const Team = () => (
    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      {teamUsers.map(u=>{
        const assigned  = myReqs.filter(r=>(Array.isArray(r.assignedTo)?r.assignedTo:(r.assignedTo?[r.assignedTo]:[])).includes(u.id)).length;
        const done      = myReqs.filter(r=>(Array.isArray(r.assignedTo)?r.assignedTo:(r.assignedTo?[r.assignedTo]:[])).includes(u.id)&&r.status==='Completed').length;
        return (
          <div key={u.id} className={`${card} p-5`}>
            <div className="flex items-center gap-3 mb-4">
              <div className="w-11 h-11 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-bold">{initials(u.name)}</div>
              <div><p className="font-semibold text-sm">{u.name}</p><p className={`text-xs ${sub}`}>{u.dept}</p></div>
            </div>
            <div className="space-y-2 text-xs">
              <div className="flex justify-between"><span className={sub}>Assigned</span><span className="font-semibold">{assigned}</span></div>
              <div className="flex justify-between"><span className={sub}>Completed</span><span className="font-semibold text-green-500">{done}</span></div>
              <div className="flex justify-between"><span className={sub}>Compliance</span><span className="font-semibold">{assigned?Math.round(done/assigned*100):0}%</span></div>
              <div className={`h-1.5 rounded-full ${dk?'bg-gray-700':'bg-gray-100'} mt-2`}>
                <div className="h-full rounded-full bg-indigo-500 transition-all" style={{width:`${assigned?Math.round(done/assigned*100):0}%`}} />
              </div>
            </div>
            <p className={`text-xs mt-3 ${sub}`}>📧 {u.email}</p>
          </div>
        );
      })}
    </div>
  );

  const pages = { overview:<Overview/>, requirements:<PHRequirements/>, team:<Team/> };

  // Requirement detail modal for Plant Head (view only)
  const PHModal = () => {
    if (!selPHReq) return null;
    const plant = plants.find(p=>p.id===selPHReq.plantId);
    const assignedIds = Array.isArray(selPHReq.assignedTo) ? selPHReq.assignedTo : (selPHReq.assignedTo ? [selPHReq.assignedTo] : []);
    const assignees = assignedIds.map(id=>users.find(u=>u.id===id)).filter(Boolean);
    const dl = daysLeft(selPHReq.dueDate);
    const sub2 = dk?'text-gray-400':'text-gray-500';
    return (
      <Modal open={!!selPHReq} onClose={()=>setSelPHReq(null)} title={selPHReq.title} wide dk={dk}>
        <div className="space-y-4 text-sm">
          <div className="flex flex-wrap gap-2">
            <Badge label={selPHReq.status}   color={STATUS_CLR[selPHReq.status]} />
            <Badge label={selPHReq.priority} color={PRIORITY_CLR[selPHReq.priority]} />
            <Badge label={selPHReq.category} color="#6366f1" />
            <Badge label={`L${selPHReq.escalationLevel} Escalation`} color="#8b5cf6" />
          </div>
          <p className={`leading-relaxed ${dk?'text-gray-200':'text-gray-700'}`}>{selPHReq.description}</p>
          <div className="grid grid-cols-2 gap-3">
            {[['📅 Due Date',formatDate(selPHReq.dueDate)],['⌛ Days Left',dl<0?`${Math.abs(dl)}d overdue`:dl===0?'Today':`${dl}d`],['🔔 Reminder',selPHReq.reminderFrequency],['🏭 Plant',plant?.name||'—'],['📍 State',plant?.state||'—'],['👤 Assigned To',assignees.length>0?assignees.map(a=>a.name).join(', '):'Unassigned']].map(([l,v])=>(
              <div key={l} className={`p-3 rounded-xl ${dk?'bg-gray-700':'bg-gray-50'}`}>
                <p className={`text-xs mb-0.5 ${sub2}`}>{l}</p>
                <p className={`font-medium text-xs ${dk?'text-gray-100':'text-gray-800'}`}>{v}</p>
              </div>
            ))}
          </div>
          {(selPHReq.applicableRule||selPHReq.legalClause) && (
            <div className={`rounded-xl border p-4 space-y-2 ${dk?'bg-indigo-900/20 border-indigo-700/40':'bg-indigo-50 border-indigo-200'}`}>
              <p className="text-xs font-bold uppercase tracking-widest text-indigo-500">⚖️ Legal &amp; Regulatory</p>
              {selPHReq.applicableRule && <><p className={`text-xs font-semibold ${dk?'text-indigo-300':'text-indigo-600'}`}>Applicable Rule</p><p className={`text-sm ${dk?'text-white':'text-gray-800'}`}>{selPHReq.applicableRule}</p></>}
              {selPHReq.legalClause && <><p className={`text-xs font-semibold ${dk?'text-indigo-300':'text-indigo-600'}`}>Legal Clause</p><p className={`text-sm leading-relaxed ${dk?'text-gray-200':'text-gray-700'}`}>{selPHReq.legalClause}</p></>}
            </div>
          )}
          {selPHReq.evidence?.length > 0 && (
            <div>
              <p className={`font-semibold mb-2 text-xs uppercase tracking-wide ${sub2}`}>📎 Evidence ({selPHReq.evidence.length})</p>
              {selPHReq.evidence.map(e=>(
                <div key={e.id} className={`flex items-center gap-3 p-3 rounded-xl mb-2 ${dk?'bg-gray-700':'bg-gray-50'}`}>
                  <span className="text-xl">{(e.mimeType||'').startsWith('image/')?'🖼️':e.name?.toLowerCase().endsWith('.pdf')?'📑':'📄'}</span>
                  <div className="flex-1 min-w-0"><p className={`text-sm font-medium truncate ${dk?'text-gray-100':'text-gray-800'}`}>{e.name}</p><p className={`text-xs ${sub2}`}>{e.size} · {formatDate(e.uploadedAt)}</p></div>
                  <button onClick={()=>{ const url=e.storageUrl||e.dataUrl; if(url) window.open(url,'_blank'); }}
                    className="px-3 py-1.5 rounded-lg text-xs font-semibold bg-indigo-600 hover:bg-indigo-700 text-white transition-colors flex-shrink-0">⬇️</button>
                </div>
              ))}
            </div>
          )}
          {selPHReq.comments?.length > 0 && (
            <div>
              <p className={`font-semibold mb-2 text-xs uppercase tracking-wide ${sub2}`}>💬 Comments ({selPHReq.comments.length})</p>
              {selPHReq.comments.map(c=>{ const u=users.find(x=>x.id===c.userId); return (
                <div key={c.id} className={`p-3 rounded-xl mb-2 ${dk?'bg-gray-700':'bg-gray-50'}`}>
                  <div className="flex items-center gap-2 mb-1">
                    <div className="w-5 h-5 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs">{initials(u?.name||'?')}</div>
                    <span className="text-xs font-medium">{u?.name||'Unknown'}</span>
                    <span className={`text-xs ${sub2}`}>{formatDate(c.createdAt)}</span>
                  </div>
                  <p className={`text-xs ${sub2}`}>{c.text}</p>
                </div>
              );})}
            </div>
          )}
        </div>
      </Modal>
    );
  };

  return (
    <AppShell dk={dk} toggleTheme={toggleTheme} currentUser={currentUser} nav={nav}
      activePage={activePage} setActivePage={setActivePage} role="plant_head" logout={logout}
      requirements={requirements} onNotifClick={handleNotifClick}>
      <PHModal />
      {pages[activePage]}
    </AppShell>
  );
}

/* ═══════════════════════════════════════════
   USER DASHBOARD
═══════════════════════════════════════════ */
function UserDashboard({ dk, toggleTheme, currentUser, plants, users, requirements, updateRequirements, logout }) {
  const [activePage, setActivePage] = useState('tasks');
  const [notifReqId, setNotifReqId] = React.useState(null);
  const myReqs    = requirements.filter(r=>(Array.isArray(r.assignedTo)?r.assignedTo:(r.assignedTo?[r.assignedTo]:[])).includes(currentUser.id));
  const myPlant   = plants.find(p=>p.id===currentUser.plantId);
  const overdueCount = myReqs.filter(r=>r.status==='Overdue').length;

  // Notification click: switch to tasks tab and open the requirement modal
  const handleNotifClick = (reqId) => {
    setActivePage('tasks');
    setNotifReqId(reqId);
  };

  const nav = [
    { id:'tasks',   icon:'📋', label:'My Tasks', badge:overdueCount },
    { id:'profile', icon:'👤', label:'Profile' },
  ];

  const card = `rounded-2xl border shadow-sm ${dk?'bg-gray-800 border-gray-700':'bg-white border-gray-200'}`;
  const sub  = dk?'text-gray-400':'text-gray-500';

  const [selReq, setSelReq] = useState(null);
  const [comment, setComment] = useState('');
  const [uploading, setUploading] = useState(false);
  const [evidenceSent, setEvidenceSent] = useState(false);
  const [showSendModal, setShowSendModal] = useState(false);
  const [sendConfirmReqId, setSendConfirmReqId] = useState(null);
  const fileRef = useRef();

  // Auto-open requirement from notification bell
  React.useEffect(() => {
    if (notifReqId) {
      // Check own tasks first, then fall back to any requirement
      const req = myReqs.find(r => r.id === notifReqId) || requirements.find(r => r.id === notifReqId);
      if (req) { setSelReq(req); setNotifReqId(null); }
    }
  }, [notifReqId, activePage]);

  const updateStatus = (id, status) => {
    const req = requirements.find(r => r.id === id);
    updateRequirements(requirements.map(r=>r.id===id?{...r,status}:r));
    if (selReq?.id===id) setSelReq(sr=>({...sr,status}));
    // ── Email: status change ──
    if (req && req.status !== status) {
      const plant    = plants.find(p => p.id === req.plantId);
      const assignedIds = Array.isArray(req.assignedTo) ? req.assignedTo : (req.assignedTo ? [req.assignedTo] : []);
      const assignee = users.find(u => assignedIds.includes(u.id) && u.id === currentUser.id) || users.find(u=>assignedIds.includes(u.id));
      sendComplianceMail({ trigger:'status_change', req:{...req,status}, plant, assignee, oldStatus:req.status, changedBy:currentUser });
    }
  };

  const addComment = (reqId) => {
    if (!comment.trim()) return;
    const c = { id:`c${Date.now()}`, text:comment, userId:currentUser.id, createdAt:new Date().toISOString() };
    const updated = requirements.map(r=>r.id===reqId?{...r,comments:[...(r.comments||[]),c]}:r);
    updateRequirements(updated);
    setSelReq(sr=>({...sr,comments:[...(sr.comments||[]),c]}));
    setComment('');
  };

  const uploadEvidence = async (reqId, file) => {
    setUploading(true);
    try {
      const evId = `ev${Date.now()}`;
      let storageUrl = null;
      let dataUrl = null;

      // Try Firebase Storage first (cross-device visibility)
      if (window.fbStorage) {
        try {
          await fbEnsureAuth();
          const path = `evidence/${reqId}/${evId}_${file.name}`;
          const ref = window.fbStorage.ref(path);
          await ref.put(file);
          storageUrl = await ref.getDownloadURL();
          console.log('✅ Uploaded to Firebase Storage:', storageUrl);
        } catch(storageErr) {
          console.warn('Firebase Storage upload failed, falling back to base64:', storageErr.message);
        }
      }

      // Fallback: base64 dataUrl (same-device only)
      if (!storageUrl) {
        dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result);
          reader.onerror = () => reject(new Error('Read failed'));
          reader.readAsDataURL(file);
        });
      }

      const ev = {
        id: evId,
        name: file.name,
        size: `${(file.size/1024).toFixed(1)} KB`,
        uploadedAt: new Date().toISOString(),
        uploadedBy: currentUser.id,
        mimeType: file.type,
        storageUrl,   // cross-device URL from Firebase Storage
        dataUrl,      // fallback base64 (null if storageUrl succeeded)
      };

      const updated = requirements.map(r => r.id===reqId ? {...r, evidence:[...(r.evidence||[]), ev]} : r);
      updateRequirements(updated);
      setSelReq(sr => ({...sr, evidence:[...(sr.evidence||[]), ev]}));
      // ── Show brief "attached" banner but keep modal open ──
      // Modal only closes when the user clicks Send
      setEvidenceSent(true);
      setTimeout(() => setEvidenceSent(false), 2200);
    } catch(err) {
      console.error('uploadEvidence failed:', err);
      alert('Upload failed: ' + err.message);
    }
    setUploading(false);
  };

  const deleteEvidence = async (reqId, evId) => {
    const req = requirements.find(r => r.id === reqId);
    const ev  = req?.evidence?.find(e => e.id === evId);
    if (!ev) return;

    // 1. Delete file from Firebase Storage (cross-device files)
    if (ev.storageUrl && window.fbStorage) {
      try {
        await fbEnsureAuth();
        const path = `evidence/${reqId}/${evId}_${ev.name}`;
        await window.fbStorage.ref(path).delete();
        console.log('🗑️ Deleted from Firebase Storage:', path);
      } catch(e) {
        // File may already be gone or path mismatch — log but continue
        console.warn('Storage delete failed (may already be removed):', e.message);
        // Try alternate path in case name was sanitised differently
        try {
          const altPath = `evidence/${reqId}/${evId}`;
          await window.fbStorage.ref(altPath).delete();
          console.log('🗑️ Deleted from Firebase Storage (alt path):', altPath);
        } catch(_) {}
      }
    } else if (!ev.storageUrl) {
      // base64-only file — lives only in Firestore document, no Storage entry to delete
      console.log('ℹ️ Evidence was base64-only, no Firebase Storage entry to delete.');
    }

    // 2. Remove evidence entry from Firestore (via updateRequirements → fbSave)
    const updated = requirements.map(r =>
      r.id === reqId ? { ...r, evidence: (r.evidence || []).filter(e => e.id !== evId) } : r
    );
    updateRequirements(updated);  // persists to localStorage + Firestore document
    setSelReq(sr => sr ? { ...sr, evidence: (sr.evidence || []).filter(e => e.id !== evId) } : sr);
    console.log('✅ Evidence entry removed from Firestore document (reqId:', reqId, ', evId:', evId, ')');
  };

  const downloadEvidence = (ev) => {
    const url = ev.storageUrl || ev.dataUrl;
    if (!url) {
      alert('File not available. Please re-upload.');
      return;
    }
    // storageUrl: open in new tab (cross-origin download)
    if (ev.storageUrl) {
      window.open(ev.storageUrl, '_blank');
      return;
    }
    // dataUrl fallback: direct download
    const a = document.createElement('a');
    a.href = ev.dataUrl;
    a.download = ev.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  const Tasks = () => {
    const statusPie = STATUSES.map(s=>({ name:s, value:myReqs.filter(r=>r.status===s).length }));
    const total=myReqs.length, done=myReqs.filter(r=>r.status==='Completed').length;
    return (
      <div className="space-y-5">
        <div className="grid grid-cols-2 xl:grid-cols-4 gap-4">
          <StatCard dk={dk} label="My Tasks"    value={total} icon="📋" color="bg-indigo-100 text-indigo-600" sub={myPlant?.name} />
          <StatCard dk={dk} label="Completed"   value={done}  icon="✅" color="bg-green-100 text-green-600"  sub={`${total?Math.round(done/total*100):0}% done`} />
          <StatCard dk={dk} label="Pending"     value={myReqs.filter(r=>r.status==='Pending').length}     icon="⏳" color="bg-amber-100 text-amber-600" />
          <StatCard dk={dk} label="Overdue"     value={myReqs.filter(r=>r.status==='Overdue').length}     icon="🚨" color="bg-red-100 text-red-600" sub="Action needed" />
        </div>

        <div className="grid grid-cols-1 gap-3">
          {myReqs.length === 0 && (
            <div className={`${card} p-10 text-center`}>
              <p className="text-4xl mb-3">🎉</p>
              <p className="font-semibold text-gray-500">No tasks assigned to you yet</p>
            </div>
          )}
          {myReqs.map(req => {
            const dl = daysLeft(req.dueDate);
            return (
              <div key={req.id} className={`${card} p-4 cursor-pointer hover:shadow-md transition-shadow`} onClick={()=>setSelReq(req)}>
                <div className="flex items-start gap-4">
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 text-lg" style={{background:STATUS_CLR[req.status]+'22'}}>
                    {req.status==='Completed'?'✅':req.status==='Overdue'?'🚨':req.status==='In Progress'?'⏳':'📋'}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-start justify-between gap-2">
                      <p className="font-semibold text-sm truncate">{req.title}</p>
                      <Badge label={req.status} color={STATUS_CLR[req.status]} />
                    </div>
                    <p className={`text-xs ${sub} mt-0.5 truncate`}>{req.description}</p>
                    <div className="flex flex-wrap items-center gap-2 mt-2">
                      <Badge label={req.priority} color={PRIORITY_CLR[req.priority]} />
                      <Badge label={req.category}  color="#6366f1" />
                      <span className={`text-xs ${dl<0?'text-red-500':dl<7?'text-amber-500':sub}`}>📅 {formatDate(req.dueDate)} {dl<0?`(${Math.abs(dl)}d overdue)`:dl<7?`(${dl}d left)`:''}</span>
                      {(req.evidence||[]).length>0 && <span className={`text-xs ${sub}`}>📎 {req.evidence.length}</span>}
                      {(req.comments||[]).length>0 && <span className={`text-xs ${sub}`}>💬 {req.comments.length}</span>}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  /* ── Task detail modal — lives at UserDashboard level so state changes don't remount it ── */
  const TaskModal = () => (
    <Modal open={!!selReq} onClose={()=>setSelReq(null)} title={selReq?.title} wide dk={dk}>
      {selReq && (
        <div className="space-y-4 text-sm">
          <div className="flex flex-wrap gap-2">
            <Badge label={selReq.status}   color={STATUS_CLR[selReq.status]}  />
            <Badge label={selReq.priority}  color={PRIORITY_CLR[selReq.priority]} />
            <Badge label={selReq.category}  color="#6366f1" />
            <Badge label={`L${selReq.escalationLevel} Escalation`} color="#8b5cf6" />
          </div>
          <p className={`leading-relaxed ${dk?'text-gray-200':'text-gray-700'}`}>{selReq.description}</p>
          <div className="grid grid-cols-2 gap-3">

/* ═══════════════════════════════════════════
   FIREBASE SYNC HELPERS
   All collections: legalcomp_plants, legalcomp_users, legalcomp_requirements
   Single-document array pattern — one doc per collection named "data"
   so the whole array is atomic and cheap on Firestore reads.
═══════════════════════════════════════════ */
const FB_PLANTS = 'legalcomp_plants';
const FB_USERS  = 'legalcomp_users';
const FB_REQS   = 'legalcomp_requirements';

/* ── Ensure Firebase has an auth token before any Firestore read ──
   Uses Anonymous Auth so Firestore rules (request.auth != null) always pass.
   If anonymous auth is disabled in Firebase console, this is a no-op and
   you must set Firestore rules to: allow read, write: if true;            ── */
async function fbEnsureAuth() {
  try {
    if (!window.fbAuth.currentUser) {
      await window.fbAuth.signInAnonymously();
    }
  } catch(e) {
    console.warn('Anonymous auth failed (may be disabled in Firebase console):', e.message);
  }
}

async function fbLoad(col) {
  await fbEnsureAuth();
  try {
    const snap = await window.db.collection(col).doc('data').get();
    if (snap.exists) return snap.data().items || null;
  } catch(e) { console.warn('fbLoad failed', col, e); }
  return null;
}

async function fbSave(col, items) {
  await fbEnsureAuth();
  try {
    await window.db.collection(col).doc('data').set({ items, updatedAt: new Date().toISOString() });
  } catch(e) { console.warn('fbSave failed', col, e); }
}

function fbListen(col, cb) {
  // Auth is already ensured by boot() before listeners are set up
  try {
    return window.db.collection(col).doc('data').onSnapshot(snap => {
      if (snap.exists) cb(snap.data().items || []);
    }, e => { console.warn('fbListen error', col, e); });
  } catch(e) { console.warn('fbListen failed', col, e); return () => {}; }
}

/* ═══════════════════════════════════════════
   ROOT APP  (Firebase-synced)
═══════════════════════════════════════════ */
function App() {
  const [theme,        setTheme]        = useState('light');
  const [currentUser,  setCurrentUser]  = useState(null);
  const [page,         setPage]         = useState('login');
  const [plants,       setPlants]       = useState(mkPlants);
  const [users,        setUsers]        = useState(mkUsers);
  const [requirements, setRequirements] = useState(null);
  const [categories,   setCategories]   = useState(() => {
    try { const s=localStorage.getItem('categories'); return s?JSON.parse(s):DEFAULT_CATEGORIES; } catch(_){ return DEFAULT_CATEGORIES; }
  });
  const [ready,        setReady]        = useState(false);
  const [syncStatus,   setSyncStatus]   = useState('idle'); // 'idle'|'syncing'|'synced'|'error'

  /* ── 1. Boot: load from Firebase, block login screen until users are loaded ── */
  useEffect(() => {
    async function boot() {
      try {
        const t = storage.get('theme');
        if (t) setTheme(t.value);
      } catch(_) {}

      setSyncStatus('syncing');
      try {
        // Step 1: Authenticate anonymously so Firestore rules pass on all devices
        await fbEnsureAuth();
        console.log('✅ Auth user:', window.fbAuth.currentUser?.uid || 'none');

        // Step 2: Load all data from Firestore
        console.log('⏳ Loading data from Firestore…');
        const [fbP, fbU, fbR] = await Promise.all([
          fbLoad(FB_PLANTS),
          fbLoad(FB_USERS),
          fbLoad(FB_REQS),
        ]);
        console.log(`📦 Firestore: ${fbP?.length||0} plants, ${fbU?.length||0} users, ${fbR?.length||0} requirements`);

        // Plants
        if (fbP && fbP.length > 0) {
          setPlants(fbP);
          storage.set('plants', JSON.stringify(fbP));
        } else {
          const lsP = storage.get('plants');
          const p = lsP ? JSON.parse(lsP.value) : mkPlants();
          setPlants(p);
          await fbSave(FB_PLANTS, p);
        }

        // Users — always prefer Firebase over seed/cache on new devices
        if (fbU && fbU.length > 0) {
          setUsers(fbU);
          storage.set('users', JSON.stringify(fbU));
        } else {
          // No Firebase users yet — seed from localStorage or defaults
          const lsU = storage.get('users');
          const u = lsU ? JSON.parse(lsU.value) : mkUsers();
          setUsers(u);
          await fbSave(FB_USERS, u);
        }

        // Requirements
        if (fbR && fbR.length > 0) {
          setRequirements(fbR);
          storage.set('requirements', JSON.stringify(fbR));
        } else {
          const lsR = storage.get('requirements');
          if (lsR) {
            const r = JSON.parse(lsR.value);
            setRequirements(r);
            await fbSave(FB_REQS, r);
          }
        }

        setSyncStatus('synced');
      } catch(err) {
        console.error('Boot sync failed, falling back to localStorage', err);
        setSyncStatus('error');
        try {
          const lsP = storage.get('plants');       if (lsP) setPlants(JSON.parse(lsP.value));
          const lsU = storage.get('users');        if (lsU) setUsers(JSON.parse(lsU.value));
          const lsR = storage.get('requirements'); if (lsR) setRequirements(JSON.parse(lsR.value));
        } catch(_) {}
      }

      setReady(true);  // ← login screen only shown AFTER this
    }
    boot();
  }, []);

  /* ── 2. Seed requirements if still null after boot ── */
  useEffect(() => {
    if (ready && requirements === null) {
      const r = mkRequirements(plants, users);
      setRequirements(r);
      storage.set('requirements', JSON.stringify(r));
      fbSave(FB_REQS, r);
    }
  }, [ready]);

  /* ── 3. Real-time listeners — keep UI in sync across tabs/devices ── */
  useEffect(() => {
    if (!ready) return;
    const unsubP = fbListen(FB_PLANTS, items => {
      setPlants(items);
      storage.set('plants', JSON.stringify(items));
    });
    const unsubU = fbListen(FB_USERS, items => {
      setUsers(items);
      storage.set('users', JSON.stringify(items));
    });
    const unsubR = fbListen(FB_REQS, items => {
      setRequirements(items);
      storage.set('requirements', JSON.stringify(items));
    });
    return () => { unsubP(); unsubU(); unsubR(); };
  }, [ready]);

  /* ── 4. Persist helpers: write to both localStorage + Firestore ── */
  const persist    = (key, val, col) => {
    try { storage.set(key, JSON.stringify(val)); } catch(_) {}
    if (col) fbSave(col, val);
  };
  const persistStr = (key, val) => { try { storage.set(key, val); } catch(_) {} };

  const updatePlants       = p => { setPlants(p);       persist('plants',       p, FB_PLANTS); };
  const updateUsers        = u => { setUsers(u);         persist('users',        u, FB_USERS);  };
  const updateRequirements = r => { setRequirements(r); persist('requirements', r, FB_REQS);   };
  const updateCategories   = c => { setCategories(c); CATEGORIES = c; try { localStorage.setItem('categories', JSON.stringify(c)); } catch(_){} };
  const toggleTheme = () => { const t=theme==='light'?'dark':'light'; setTheme(t); persistStr('theme',t); };

  /* ── Daily Digest Scheduler ── */
  useDailyDigestScheduler(requirements || [], plants, users);

  /* ── "Send Now" custom event listener (from Settings test button) ── */
  useEffect(() => {
    const handler = () => {
      if (requirements && plants && users) {
        sendDailyDigestMail(requirements, plants, users);
      }
    };
    window.addEventListener('legalcomp:send_daily_digest', handler);
    return () => window.removeEventListener('legalcomp:send_daily_digest', handler);
  }, [requirements, plants, users]);

  const login = async (email, password) => {
    const emailL = email.toLowerCase().trim();

    // Always fetch live from Firebase — avoids stale-closure issues on new devices
    // where React state may not yet reflect the latest users from Firestore
    try {
      const freshUsers = await fbLoad(FB_USERS);
      if (freshUsers && freshUsers.length > 0) {
        setUsers(freshUsers); // keep React state fresh
        const u = freshUsers.find(x => x.email.toLowerCase() === emailL && x.password === password);
        if (u) { setCurrentUser(u); setPage(u.role); return true; }
        // Firebase returned users but no match → definitely wrong credentials
        return false;
      }
    } catch(e) {
      console.warn('Firebase login fetch failed, falling back to local state:', e);
    }

    // Firebase unavailable — fall back to in-memory users (offline resilience)
    const u = users.find(x => x.email.toLowerCase() === emailL && x.password === password);
    if (u) { setCurrentUser(u); setPage(u.role); return true; }
    return false;
  };
  const logout = () => { setCurrentUser(null); setPage('login'); };

  const dk = theme === 'dark';

  useEffect(() => {
    document.body.style.fontFamily = "'DM Sans', sans-serif";
    document.body.style.background = dk ? '#111827' : '#f8fafc';
  }, [dk]);
