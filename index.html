/* ─── FIREBASE STATUS BADGE ─── */
function FirebaseStatusBadge() {
  const [status, setStatus] = React.useState('checking'); // 'checking' | 'connected' | 'error'

  React.useEffect(() => {
    let cancelled = false;
    async function check() {
      try {
        await window.db.collection('_ping').limit(1).get();
        if (!cancelled) setStatus('connected');
      } catch (e) {
        if (!cancelled) setStatus('error');
      }
    }
    check();
    // Re-check every 60s
    const interval = setInterval(check, 60000);
    return () => { cancelled = true; clearInterval(interval); };
  }, []);

  const cfg = {
    checking:  { dot: 'bg-yellow-400 animate-pulse', text: 'text-yellow-600 dark:text-yellow-300', label: 'Firebase…',   title: 'Connecting to Firebase…' },
    connected: { dot: 'bg-green-500',                text: 'text-green-600 dark:text-green-400',   label: 'Firebase ✓',  title: 'Firebase connected — skr-task' },
    error:     { dot: 'bg-red-500',                  text: 'text-red-600 dark:text-red-400',        label: 'Firebase ✗',  title: 'Firebase connection failed — check Firestore rules' },
  }[status];

  return (
    <div className="flex items-center gap-1.5 text-xs font-semibold select-none cursor-default" title={cfg.title}>
      <span className={`w-2 h-2 rounded-full flex-shrink-0 ${cfg.dot}`} />
      <span className={cfg.text}>{cfg.label}</span>
    </div>
  );
}

/* ─── DOWNLOAD EVIDENCE HELPER ─── */
function downloadEvidence(ev) {
  const url = ev.storageUrl || ev.url || ev.dataUrl;
  if (!url) {
    alert('File not available. Please re-upload.');
    return;
  }
  // storageUrl / external URL: open in new tab
  if (ev.storageUrl || ev.url) {
    window.open(url, '_blank');
    return;
  }
  // base64 fallback
  const a = document.createElement('a');
  a.href = url;
  a.download = ev.name || 'evidence';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* ─── NOTIFICATION BELL ─── */
function NotificationBell({ dk, requirements, role, onNotifClick }) {
  const [open, setOpen] = React.useState(false);
  const [seen, setSeen] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('notif_seen') || '[]'); } catch { return []; }
  });
  const ref = React.useRef(null);

  // Build notifications: overdue + newly uploaded evidence
  const notifications = React.useMemo(() => {
    const list = [];
    requirements.forEach(r => {
      if (r.status === 'Overdue') {
        list.push({ id: `overdue-${r.id}`, type: 'overdue', reqId: r.id, title: r.title, plant: r.plantId, ts: r.dueDate, msg: `Overdue since ${r.dueDate}` });
      }
      (r.evidence || []).forEach(ev => {
        list.push({ id: `ev-${ev.id}`, type: 'evidence', reqId: r.id, title: r.title, plant: r.plantId, ts: ev.uploadedAt, msg: `📎 Evidence uploaded: ${ev.name}` });
      });
    });
    // Sort newest first
    list.sort((a, b) => new Date(b.ts) - new Date(a.ts));
    return list.slice(0, 30);
  }, [requirements]);

  const unreadIds = notifications.filter(n => !seen.includes(n.id)).map(n => n.id);
  const unreadCount = unreadIds.length;

  const markAllRead = () => {
    const allIds = notifications.map(n => n.id);
    localStorage.setItem('notif_seen', JSON.stringify(allIds));
    setSeen(allIds);
  };

  // Close on outside click
  React.useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const typeIcon = { overdue: '🚨', evidence: '📎' };
  const typeColor = { overdue: dk ? 'text-red-400' : 'text-red-600', evidence: dk ? 'text-indigo-400' : 'text-indigo-600' };

  return (
    <div ref={ref} className="relative">
      <button
        onClick={() => { setOpen(o => !o); }}
        className={`relative p-2 rounded-lg transition-colors ${dk ? 'text-gray-300 hover:bg-gray-700' : 'text-slate-600 hover:bg-gray-100'}`}
        title="Notifications"
      >
        <span className="text-lg">🔔</span>
        {unreadCount > 0 && (
          <span className="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center px-1 shadow">
            {unreadCount > 99 ? '99+' : unreadCount}
          </span>
        )}
      </button>

      {open && (
        <div className={`absolute right-0 top-full mt-2 w-80 rounded-2xl shadow-2xl border z-50 ${dk ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}
          style={{ maxHeight: '420px', overflowY: 'auto' }}>
          {/* Header */}
          <div className={`flex items-center justify-between px-4 py-3 border-b sticky top-0 ${dk ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-100'}`}>
            <p className={`font-semibold text-sm ${dk ? 'text-white' : 'text-gray-900'}`}>Notifications {unreadCount > 0 && <span className="ml-1 text-xs bg-red-500 text-white rounded-full px-1.5 py-0.5">{unreadCount}</span>}</p>
            {unreadCount > 0 && (
              <button onClick={markAllRead} className="text-xs text-indigo-500 hover:underline font-medium">Mark all read</button>
            )}
          </div>

          {/* List */}
          {notifications.length === 0 ? (
            <div className="px-4 py-8 text-center">
              <p className="text-2xl mb-2">🎉</p>
              <p className={`text-sm ${dk ? 'text-gray-400' : 'text-gray-500'}`}>No notifications yet</p>
            </div>
          ) : (
            <div className="divide-y divide-gray-100 dark:divide-gray-700">
              {notifications.map(n => {
                const isUnread = !seen.includes(n.id);
                return (
                  <div key={n.id}
                    onClick={() => {
                      // Mark this notification as read
                      if (isUnread) {
                        const updated = [...seen, n.id];
                        localStorage.setItem('notif_seen', JSON.stringify(updated));
                        setSeen(updated);
                      }
                      // Navigate to the requirement
                      if (onNotifClick && n.reqId) {
                        onNotifClick(n.reqId);
                        setOpen(false);
                      }
                    }}
                    className={`px-4 py-3 transition-colors ${onNotifClick ? 'cursor-pointer' : 'cursor-default'} ${isUnread ? (dk ? 'bg-indigo-900/20' : 'bg-indigo-50/60') : ''} ${dk ? 'hover:bg-gray-700/50' : 'hover:bg-gray-50'}`}>
                    <div className="flex items-start gap-2">
                      <span className="text-base mt-0.5 flex-shrink-0">{typeIcon[n.type]}</span>
                      <div className="flex-1 min-w-0">
                        <p className={`text-xs font-semibold truncate ${typeColor[n.type]}`}>{n.title}</p>
                        <p className={`text-xs mt-0.5 ${dk ? 'text-gray-300' : 'text-gray-600'}`}>{n.msg}</p>
                        <p className={`text-[10px] mt-0.5 ${dk ? 'text-gray-500' : 'text-gray-400'}`}>{n.ts ? new Date(n.ts).toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : ''}</p>
                      </div>
                      <div className="flex items-center gap-1 flex-shrink-0 mt-0.5">
                        {isUnread && <span className="w-2 h-2 rounded-full bg-indigo-500"></span>}
                        {onNotifClick && <span className="text-gray-300 dark:text-gray-600 text-xs">›</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── STAT CARD ─── */
function StatCard({ label, value, icon, color, sub, trend, dk, onClick }) {
  const cardBg = dk?'bg-gray-800 border-gray-700':'bg-white border-gray-200';
  return (
    <div
      className={`rounded-2xl border p-5 ${cardBg} shadow-sm ${onClick?'cursor-pointer hover:shadow-md hover:ring-2 hover:ring-indigo-400/40 transition-all duration-150':''}`}
      onClick={onClick}
    >
      <div className="flex items-start justify-between mb-3">
        <div className={`w-11 h-11 rounded-xl flex items-center justify-center text-xl ${color}`}>{icon}</div>
        {trend !== undefined && (
          <span className={`text-xs font-semibold px-2 py-1 rounded-full ${trend>=0?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
            {trend>=0?'↑':'↓'} {Math.abs(trend)}%
          </span>
        )}
      </div>
      <p className="text-3xl font-bold mb-0.5" style={{fontFamily:"'Outfit',sans-serif"}}>{value}</p>
      <p className="text-sm font-medium text-gray-700 dark:text-gray-200">{label}</p>
      {sub && <p className="text-xs text-gray-400 mt-0.5">{sub}</p>}
      {onClick && <p className="text-xs text-indigo-400 mt-1.5 font-medium">Click to view list →</p>}
    </div>
  );
}

/* ═══════════════════════════════════════════
   ADMIN – OVERVIEW

function AdminOverview({ dk, plants, users, requirements, categories: catsProp, openReqId, onNotifReqOpened }) {
  const cats = catsProp || CATEGORIES;
  const [selPlant, setSelPlant] = useState('');
  const [drillModal, setDrillModal] = useState(null);
  const [exportLoading, setExportLoading] = useState('');

  const getExportData = () => {
    const scopeReqs = selPlant ? requirements.filter(r=>r.plantId===selPlant) : requirements;
    return scopeReqs.map(r => {
      const plant = plants.find(p=>p.id===r.plantId);
      const assignedIds = Array.isArray(r.assignedTo) ? r.assignedTo : (r.assignedTo ? [r.assignedTo] : []);
      const assignees = assignedIds.map(id=>users.find(u=>u.id===id)).filter(Boolean).map(u=>u.name).join('; ');
      return {
        'ID': r.id,
        'Title': r.title,
        'Category': r.category,
        'Priority': r.priority,
        'Status': r.status,
        'Plant': plant?.name || '—',
        'State': plant?.state || '—',
        'Assigned To': assignees || 'Unassigned',
        'Due Date': r.dueDate || '—',
        'Reminder Frequency': r.reminderFrequency || '—',
        'Escalation Level': r.escalationLevel ? `Level ${r.escalationLevel}` : '—',
        'Applicable Rule': r.applicableRule || '—',
        'Completion Date': r.completionDate || '—',
        'Created At': r.createdAt ? new Date(r.createdAt).toLocaleDateString('en-IN') : '—',
        'Description': r.description || '',
      };
    });
  };

  const exportCSV = () => {
    setExportLoading('csv');
    try {
      const rows = getExportData();
      if (!rows.length) { alert('No data to export.'); setExportLoading(''); return; }
      const headers = Object.keys(rows[0]);
      const escape = v => `"${String(v).replace(/"/g,'""')}"`;
      const csv = [headers.map(escape).join(','), ...rows.map(r => headers.map(h=>escape(r[h]||'')).join(','))].join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const scopeLabel = selPlant ? plants.find(p=>p.id===selPlant)?.name?.replace(/\s+/g,'_') : 'All_Plants';
      a.href = url;
      a.download = `Legal_Compliance_${scopeLabel}_${new Date().toISOString().split('T')[0]}.csv`;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    } catch(e) { console.error(e); }
    setTimeout(() => setExportLoading(''), 800);
  };

  const exportPDF = () => {
    setExportLoading('pdf');
    try {
      const rows = getExportData();
      const scopeLabel = selPlant ? plants.find(p=>p.id===selPlant)?.name : 'All Plants';
      const total = rows.length;
      const completed = rows.filter(r=>r['Status']==='Completed').length;
      const overdue = rows.filter(r=>r['Status']==='Overdue').length;
      const pending = rows.filter(r=>r['Status']==='Pending').length;
      const inProg = rows.filter(r=>r['Status']==='In Progress').length;
      const compliance = total ? Math.round(completed/total*100) : 0;
      const now = new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

      const statusColor = { Completed:'#22c55e', 'In Progress':'#6366f1', Pending:'#f59e0b', Overdue:'#ef4444' };
      const priorityColor = { Critical:'#ef4444', High:'#f97316', Medium:'#f59e0b', Low:'#22c55e' };

      const tableRows = rows.map(r => `
        <tr>
          <td>${r['Title']}</td>
          <td>${r['Category']}</td>
          <td><span class="badge" style="background:${priorityColor[r['Priority']]||'#888'}22;color:${priorityColor[r['Priority']]||'#888'}">${r['Priority']}</span></td>
          <td><span class="badge" style="background:${statusColor[r['Status']]||'#888'}22;color:${statusColor[r['Status']]||'#888'}">${r['Status']}</span></td>
          <td>${r['Plant']}</td>
          <td>${r['Assigned To']}</td>
          <td>${r['Due Date']}</td>
          <td>${r['Escalation Level']}</td>
        </tr>`).join('');

      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
        <title>Legal Compliance Report</title>
        <style>
          *{box-sizing:border-box;margin:0;padding:0}
          body{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;color:#111;background:#fff;padding:32px}
          .header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #6366f1;padding-bottom:16px;margin-bottom:24px}
          .header h1{font-size:22px;font-weight:800;color:#6366f1;letter-spacing:-0.5px}
          .header .meta{text-align:right;color:#555;font-size:11px;line-height:1.7}
          .summary{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
          .stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px;text-align:center}
          .stat .val{font-size:22px;font-weight:800;color:#6366f1}
          .stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;margin-top:2px}
          .stat.green .val{color:#22c55e} .stat.red .val{color:#ef4444} .stat.amber .val{color:#f59e0b} .stat.blue .val{color:#3b82f6}
          table{width:100%;border-collapse:collapse;margin-top:8px}
          th{background:#6366f1;color:#fff;padding:9px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
          td{padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:11px;vertical-align:top}
          tr:nth-child(even) td{background:#f8fafc}
          .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
          .footer{margin-top:24px;padding-top:12px;border-top:1px solid #e2e8f0;font-size:10px;color:#94a3b8;text-align:center}
          @media print{body{padding:16px}@page{margin:15mm}}
        </style></head><body>
        <div class="header">
          <div>
            <h1>⚖️ Legal Compliance Report</h1>
            <div style="color:#6366f1;font-size:13px;font-weight:600;margin-top:4px">Polyplastics — ${scopeLabel}</div>
          </div>
          <div class="meta">
            <div><strong>Generated:</strong> ${now}</div>

        </div>
        <div class="summary">
          <div class="stat"><div class="val">${total}</div><div class="lbl">Total</div></div>
          <div class="stat green"><div class="val">${compliance}%</div><div class="lbl">Compliance</div></div>

                  <div>
                    <p className="text-sm font-medium text-red-600">{r.title}</p>
                    <p className={`text-xs ${sub}`}>{plant?.name} · {r.category} · Due {formatDate(r.dueDate)}</p>
                  </div>
                  <Badge label={`${Math.abs(daysLeft(r.dueDate))}d overdue`} color="#ef4444" />
                </div>
              );
            })}
            {scopedReqs.filter(r=>r.status==='Overdue').length > 5 && (
              <button className="w-full py-2 text-xs text-red-500 font-medium hover:underline"
                onClick={()=>openDrill(`Overdue – ${scopeLabel}`, scopedReqs.filter(r=>r.status==='Overdue'))}>
                View all {scopedReqs.filter(r=>r.status==='Overdue').length} overdue →
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   MICROSOFT GRAPH API HELPER
   – replaces EmailJS; uses Azure AD (MSAL)
     + Microsoft Graph /sendMail endpoint
═══════════════════════════════════════════ */

// ── MSAL singleton cache (one instance per clientId+tenantId) ──────────
// BUG FIX: creating new PublicClientApplication() on every call caused token-cache
// conflicts and "interaction_in_progress" errors because MSAL writes auth state to
// localStorage and multiple instances step on each other.
const _msalInstances = {};

/**
 * getMSGraphToken()
 * Acquires a delegated access token from Azure AD using MSAL popup/silent flow.
 * Requires adminSettings: { msClientId, msTenantId }
 */
async function getMSGraphToken(cfg) {
  if (typeof msal === 'undefined') {
    throw new Error(
      'MSAL library failed to load. Please check your internet connection and try refreshing the page. ' +
      'If the problem persists, ensure your network allows access to unpkg.com or cdn.jsdelivr.net.'
    );
  }
  if (!cfg.msClientId || !cfg.msTenantId) {
    throw new Error('Azure App (Client) ID and Tenant ID are required.');
  }

  // BUG FIX: redirectUri was window.location.origin which equals the string "null"
  // for file:// URLs, and may not match Azure AD registration for hosted pages.
  // Use the full page URL (no hash/query). Register THIS exact URL in Azure AD under:
  //   App registrations → Authentication → Redirect URIs (type: Single-page application)
  const redirectUri = window.location.href.split('?')[0].split('#')[0];

  const cacheKey = `${cfg.msClientId}::${cfg.msTenantId}`;
  if (!_msalInstances[cacheKey]) {
    const msalConfig = {
      auth: {
        clientId:    cfg.msClientId,
        authority:   `https://login.microsoftonline.com/${cfg.msTenantId}`,
        redirectUri,
      },
      cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false },
    };
    const inst = new msal.PublicClientApplication(msalConfig);
    await inst.initialize();
    _msalInstances[cacheKey] = inst;
    console.log(`🔑 MSAL instance created — redirectUri: ${redirectUri}`);
  }
  const msalInstance = _msalInstances[cacheKey];

  const request = { scopes: ['Mail.Send', 'User.Read'] };

  // Try silent first (uses cached token)
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    try {
      const silentResult = await msalInstance.acquireTokenSilent({ ...request, account: accounts[0] });
      return silentResult.accessToken;
    } catch (_) { /* fall through to popup */ }
  }
  // Interactive popup login
  const popupResult = await msalInstance.loginPopup(request);
  return popupResult.accessToken;
}

/**
 * sendGraphMail(accessToken, { toEmail, subject, htmlBody })
 * POST to Microsoft Graph /me/sendMail
 */
async function sendGraphMail(accessToken, { toEmail, subject, htmlBody }) {
  const body = {
    message: {
      subject,
      body: { contentType: 'HTML', content: htmlBody },
      toRecipients: [{ emailAddress: { address: toEmail } }],
    },
    saveToSentItems: true,
  };
  const res = await fetch('https://graph.microsoft.com/v1.0/me/sendMail', {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${accessToken}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const errText = await res.text().catch(() => res.statusText);
    throw new Error(`Graph API error ${res.status}: ${errText}`);
  }
}

/* ═══════════════════════════════════════════
   EMAILJS HELPER
   – Alternative email provider using EmailJS
     No backend required; uses EmailJS SDK
═══════════════════════════════════════════ */

/**
 * sendEmailJsMail(cfg, { toEmail, subject, htmlBody, templateParams })
 * Sends an email via EmailJS using a template or raw params.
 * cfg: { ejsServiceId, ejsTemplateId, ejsPublicKey, msToEmail }
 */
async function sendEmailJsMail(cfg, { toEmail, subject, plainText, templateParams }) {
  if (typeof emailjs === 'undefined') {
    throw new Error('EmailJS library failed to load. Check your internet connection or ad-blockers.');
  }
  if (!cfg.ejsServiceId || !cfg.ejsTemplateId || !cfg.ejsPublicKey) {
    throw new Error('EmailJS Service ID, Template ID, and Public Key are all required.');
  }

  // Initialize EmailJS (idempotent)
  emailjs.init({ publicKey: cfg.ejsPublicKey });

  // Merge caller params with standard params
  const params = {
    to_email:    toEmail,
    to_name:     templateParams?.to_name     || 'Compliance Team',
    from_name:   templateParams?.from_name   || 'Polyplastics',
    subject:     subject,
    message:     plainText || templateParams?.message || subject,
    reply_to:    cfg.fromEmail || cfg.msToEmail || '',
    // extra fields callers may supply
    ...(templateParams || {}),
  };

  // BUG FIX: EmailJS v4 rejects (throws) on hard errors, but resolves with non-200
  // for soft failures (e.g. bad template variable). We must check both cases.
  // Also: the `to_email` param only reaches the recipient if your EmailJS template's
  // "To Email" field is set to {{to_email}} in the EmailJS dashboard. If it's
  // hardcoded in the template, every email goes to that address regardless of toEmail.
  let response;
  try {
    response = await emailjs.send(cfg.ejsServiceId, cfg.ejsTemplateId, params);
  } catch (sendErr) {
    // EmailJS throws an object {status, text} — normalise to Error
    const msg = sendErr?.text || sendErr?.message || String(sendErr);
    const code = sendErr?.status ? ` (status ${sendErr.status})` : '';
    throw new Error(`EmailJS send rejected${code}: ${msg}`);
  }
  if (!response || response.status !== 200) {
    throw new Error(`EmailJS responded with status ${response?.status}: ${response?.text}`);
  }
  return response;
}

/**
 * buildEmailJsPlainText({ greeting, openingLine, rows, closingRemark, portalLink, sentDate })
 * Returns a plain-text fallback string for EmailJS templates.
 */
function buildEmailJsPlainText({ greeting, openingLine, rows, closingRemark, portalLink, sentDate }) {
  const rowLines = rows
    .filter(([, , value]) => value)
    .map(([icon, label, value]) => `  ${icon} ${label}: ${value}`)
    .join('\n');
  return `${greeting}

${openingLine}

${rowLines}

${closingRemark}

Open Compliance Portal: ${portalLink}

Sent on ${sentDate} · Polyplastics`;
}

/**
 * sendComplianceMail({ trigger, req, plant, assignee, oldAssignee, oldStatus, changedBy })
 *
 * trigger: 'new_requirement' | 'status_change' | 'new_assignment' | 'reassignment'
 *          | 'plant_added' | 'plant_deleted' | 'plant_updated'
 *
 * Reads email provider settings from localStorage.
 * emailProvider: 'graph' (Microsoft Graph API) | 'emailjs' | 'both'
 */
async function sendComplianceMail({ trigger, req, plant, assignee, oldAssignee, oldStatus, changedBy }) {
  // Log every notification event for the daily digest
  logDigestActivity({ trigger, req, plant, assignee, oldStatus, changedBy });
  try {
    const raw = localStorage.getItem('adminSettings');
    if (!raw) return;
    const cfg = JSON.parse(raw);

    const provider = cfg.emailProvider || 'graph'; // 'graph' | 'emailjs' | 'both'
    // BUG FIX: previously `|| cfg.msEnabled` caused Graph to run even when provider='emailjs',
    // which triggered a popup that browsers block in automated flows, silently killing everything.
    const useGraph  = provider === 'graph'  || provider === 'both';
    const useEjs    = provider === 'emailjs' || provider === 'both';

    // Quick-exit if neither provider is configured
    const graphReady = useGraph  && cfg.msClientId && cfg.msTenantId && cfg.msToEmail;
    const ejsReady   = (useEjs || cfg.ejsEnabled) && cfg.ejsServiceId && cfg.ejsTemplateId && cfg.ejsPublicKey && cfg.msToEmail;
    if (!graphReady && !ejsReady) return;

    // ── Shared helpers ──────────────────────────────────────────────────
    const fmtDate  = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—';
    const calcDays = d => { const diff = Math.ceil((new Date(d) - Date.now()) / 86400000); return diff > 0 ? diff : 0; };
    const sentDate = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const portalLink = window.location.href.split('?')[0];
    const byLabel    = changedBy ? changedBy.name : 'System';

    // ── Per-trigger subject, greeting, openingLine, rows, closing ───────
    let subject = '', greeting = 'Dear Compliance Team,', openingLine = '';
    let sectionTitle = 'REQUIREMENT DETAILS', triggerLabel = 'Notification', closingRemark = '';
    let baseRows = [];
    let extrasByRecipient = {};

    const reqRows = () => {
      const escEmails = req?.escalationEmails && typeof req.escalationEmails === 'object'
        ? req.escalationEmails
        : (req?.escalationEmail ? { 1:[req.escalationEmail], 2:[], 3:[] } : {});
      const currentLevel = req?.escalationLevel || 1;
      const escEmailList = [];
      for (let lv = 1; lv <= 3; lv++) {
        const emails = escEmails[lv] || [];
        if (emails.length) escEmailList.push(`L${lv}: ${emails.join(', ')}`);
      }
      return [
        ['📋','Title',        req?.title],
        ['🏷️','Category',    req?.category],
        ['⚡','Priority',     req?.priority],
        ['⏳','Status',       req?.status],
        ['📅','Due Date',     fmtDate(req?.dueDate)],
        ['✅','Completion Date', req?.completionDate ? fmtDate(req.completionDate) : null],
        ['⌛','Days Left',    req?.dueDate ? `${calcDays(req.dueDate)} days` : null],
        ['🔔','Reminder',     req?.reminderFrequency],
        ['🏭','Plant',        plant ? `${plant.name} (${plant.state})` : null],
        ['⬆️','Escalation',   req?.escalationLevel ? `Level ${req.escalationLevel}` : null],
        ['📧','Escalation Emails', escEmailList.length ? escEmailList.join(' | ') : null],
      ];
    };

    if (trigger === 'new_requirement') {
      subject       = `[LegalComp] New Requirement Added: ${req?.title}`;
      triggerLabel  = 'New Requirement';
      openingLine   = 'A new compliance requirement has been created in the system and is ready for action.';
      closingRemark = 'Please ensure the requirement is reviewed and assigned promptly.';
      baseRows = [
        ...reqRows(),
        ['👤','Assigned To', assignee ? `${assignee.name} (${assignee.dept || '—'})` : null],
        ['📝','Description', req?.description],
      ];

    } else if (trigger === 'new_assignment') {
      subject       = `[LegalComp] New Compliance Task Assigned to You: ${req?.title}`;
      sectionTitle  = 'ASSIGNED REQUIREMENT DETAILS';
      triggerLabel  = 'New Assignment';
      openingLine   = 'A compliance requirement has been assigned. Please review the details below and take the necessary action before the due date.';
      closingRemark = 'Please log in to the compliance portal to review the requirement, upload evidence and update the status once completed.';
      extrasByRecipient[cfg.msToEmail] = {
        greeting:    'Dear Compliance Team,',
        extraRows:   [['👤','Assigned To', assignee ? `${assignee.name} (${assignee.email})` : null]],
      };
      if (assignee?.email && assignee.email !== cfg.msToEmail) {
        extrasByRecipient[assignee.email] = {
          greeting:  `Dear ${assignee.name},`,
          extraRows: [],
        };
      }
      baseRows = [...reqRows(), ['📝','Description', req?.description]];

    } else if (trigger === 'status_change') {
      subject       = `[LegalComp] Status Updated → ${req?.status}: ${req?.title}`;
      sectionTitle  = 'UPDATED REQUIREMENT DETAILS';
      triggerLabel  = 'Status Updated';
      greeting      = assignee ? `Dear ${assignee.name},` : 'Dear Compliance Team,';
      openingLine   = `The status of a compliance requirement has been updated from "${oldStatus}" to "${req?.status}".`;
      closingRemark = 'Please review the updated status and ensure all compliance actions are on track.';
      baseRows = reqRows();

    } else if (trigger === 'reassignment') {
      const oldLabel = oldAssignee ? `${oldAssignee.name} (${oldAssignee.email})` : 'Unassigned';
      subject       = `[LegalComp] Requirement Reassigned: ${req?.title}`;
      sectionTitle  = 'REASSIGNMENT DETAILS';
      triggerLabel  = 'Reassigned';
      closingRemark = 'Please log in to the compliance portal to review and begin work on this requirement.';
      extrasByRecipient[cfg.msToEmail] = {
        greeting:    'Dear Compliance Team,',
        openingLine: `A compliance requirement has been reassigned from ${oldLabel} to ${assignee?.name || 'a new team member'}.`,
        extraRows:   [['👤','New Assignee', assignee ? `${assignee.name} (${assignee.email})` : null]],
      };
      if (assignee?.email && assignee.email !== cfg.msToEmail) {
        extrasByRecipient[assignee.email] = {
          greeting:    `Dear ${assignee.name},`,
          openingLine: 'A compliance requirement has been reassigned to you. Please review the details and take ownership immediately.',
          extraRows:   [],
        };
      }
      baseRows = reqRows();

    } else if (['plant_added','plant_deleted','plant_updated'].includes(trigger)) {
      const labels  = { plant_added:'Plant Added', plant_deleted:'Plant Removed', plant_updated:'Plant Updated' };
      const openings = {
        plant_added:   `A new plant location has been added to the LegalComp system by ${byLabel}.`,
        plant_deleted: `A plant location has been removed from the LegalComp system by ${byLabel}.`,
        plant_updated: `A plant location has been updated in the LegalComp system by ${byLabel}.`,
      };
      const closings = {
        plant_added:   'Please ensure compliance requirements are set up for this new plant.',
        plant_deleted: 'Please archive all related compliance records for this plant.',
        plant_updated: 'Please verify the updated plant details in the compliance portal.',
      };
      subject       = `[LegalComp] ${labels[trigger]}: ${plant?.name}`;
      sectionTitle  = 'PLANT DETAILS';
      triggerLabel  = labels[trigger];
      openingLine   = openings[trigger];
      closingRemark = closings[trigger];
      baseRows = [
        ['🏭','Plant Name',  plant?.name],
        ['📍','State',       plant?.state],
        ['👤','Changed By',  byLabel],
      ];
    } else {
      return;
    }

    // ── Acquire Graph token once (if needed) ────────────────────────────
    let accessToken = null;
    if (graphReady) {
      try {
        accessToken = await getMSGraphToken(cfg);
      } catch(e) {
        console.warn('⚠️ MS Graph token acquisition failed:', e?.message || e);
        if (!ejsReady) return; // nothing else to fall back to
      }
    }

    // ── Collect recipients ──────────────────────────────────────────────
    const recipients = new Set([cfg.msToEmail]);
    if (assignee?.email) recipients.add(assignee.email);
    if (oldAssignee?.email && trigger === 'reassignment') recipients.add(oldAssignee.email);
    // ── Add per-level escalation emails ──────────────────────────────────
    if (req) {
      // Per-requirement emails take precedence; fall back to global adminSettings map
      const perReqEmails = req.escalationEmails && typeof req.escalationEmails === 'object'
        ? req.escalationEmails
        : (req.escalationEmail ? { 1:[req.escalationEmail], 2:[], 3:[] } : null);
      const globalMap = cfg.escalationEmailsMap && typeof cfg.escalationEmailsMap === 'object'
        ? cfg.escalationEmailsMap
        : { 1: cfg.escalation1?[cfg.escalation1]:[], 2: cfg.escalation2?[cfg.escalation2]:[], 3: cfg.escalation3?[cfg.escalation3]:[] };
      const escEmails = perReqEmails || globalMap;
      const currentLevel = req.escalationLevel || 1;
      // Send to all levels up to and including current escalation level
      for (let lv = 1; lv <= currentLevel; lv++) {
        const lvEmails = escEmails[lv] || [];
        lvEmails.forEach(e => { if(e) recipients.add(e); });
      }
    }

    // ── Fire one send per recipient ─────────────────────────────────────
    for (const toEmail of recipients) {
      const overrides  = extrasByRecipient[toEmail] || {};
      const finalRows  = [...baseRows, ...(overrides.extraRows || [])];
      const finalGreeting    = overrides.greeting    || greeting;
      const finalOpeningLine = overrides.openingLine || openingLine;

      // ── Microsoft Graph send ──────────────────────────────────────────
      if (graphReady && accessToken) {
        try {
          const htmlBody = buildComplianceHtml({
            subject,
            greeting:    finalGreeting,
            openingLine: finalOpeningLine,
            sectionTitle,
            triggerLabel,
            rows:        finalRows,
            closingRemark,
            portalLink,
            sentDate,
          });
          await sendGraphMail(accessToken, { toEmail, subject, htmlBody });
          console.log(`✅ [MS Graph] ${trigger} → ${toEmail}`);
        } catch(e) {
          console.warn(`⚠️ MS Graph send failed for ${toEmail}:`, e?.message || e);
        }
      }

      // ── EmailJS send ──────────────────────────────────────────────────
      if (ejsReady) {
        try {
          const plainText = buildEmailJsPlainText({
            greeting:    finalGreeting,
            openingLine: finalOpeningLine,
            rows:        finalRows,
            closingRemark,
            portalLink,
            sentDate,
          });
          // Build a rich templateParams map for flexible EmailJS templates
          const reqObj = req || {};
          const plantObj = plant || {};
          await sendEmailJsMail(cfg, {
            toEmail,
            subject,
            plainText,
            templateParams: {
              to_name:         overrides.greeting ? overrides.greeting.replace(/^Dear\s+/i,'').replace(/,$/,'') : 'Compliance Team',
              from_name:       'Polyplastics',
              trigger_label:   triggerLabel,
              opening_line:    finalOpeningLine,
              closing_remark:  closingRemark,
              portal_link:     portalLink,
              sent_date:       sentDate,
              req_title:       reqObj.title        || '',
              req_category:    reqObj.category      || '',
              req_priority:    reqObj.priority      || '',

/**
 * Appends an activity entry to the in-memory digest log (window.__digestLog).
 * Called from sendComplianceMail so every real notification is captured.
 */
function logDigestActivity({ trigger, req, plant, assignee, oldStatus, changedBy }) {
  if (!window.__digestLog) window.__digestLog = [];
  window.__digestLog.push({
    ts: new Date().toISOString(),
    trigger,
    title:       req?.title       || '',
    category:    req?.category    || '',
    priority:    req?.priority    || '',
    status:      req?.status      || '',
    oldStatus:   oldStatus        || '',
    dueDate:     req?.dueDate     || '',
    plant:       plant?.name      || '',
    state:       plant?.state     || '',
    assignee:    assignee?.name   || '',
    changedBy:   changedBy?.name  || 'System',
  });
}

    const ejsReady   = (useEjs || cfg.ejsEnabled) && cfg.ejsServiceId && cfg.ejsTemplateId && cfg.ejsPublicKey && cfg.msToEmail;
